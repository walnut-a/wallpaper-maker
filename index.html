      function formatAdvancedValue(control, value) {
        if (control.format === "percent") {
          return formatPercent(value);
        }
        return `${Number(value).toFixed(2)}`;
      }

      function renderAdvancedControls() {
        elements.advancedContent.innerHTML = "";
        const groups = getCurrentAdvancedGroups(state);

        groups.forEach((group) => {
          const wrapper = document.createElement("section");
          wrapper.className = "advanced-group";

          const title = document.createElement("div");
          title.className = "advanced-group-title";
          title.textContent = group.title;
          wrapper.appendChild(title);

          group.controls.forEach((control) => {
            const field = document.createElement("div");
            field.className = "field";

            const header = document.createElement("div");
            header.className = "slider-header";

            const label = document.createElement("label");
            label.htmlFor = `advanced-${control.key}`;
            label.textContent = control.label;

            const value = document.createElement("span");
            value.className = "value-badge";
            value.id = `advanced-value-${control.key}`;
            value.textContent = formatAdvancedValue(control, state.advanced[control.key]);

            header.appendChild(label);
            header.appendChild(value);

            const input = document.createElement("input");
            input.type = "range";
            input.id = `advanced-${control.key}`;
            input.min = String(control.min);
            input.max = String(control.max);
            input.step = String(control.step);
            input.value = String(state.advanced[control.key]);
            input.dataset.advancedKey = control.key;
            input.addEventListener("input", (event) => {
              const nextValue = Number(event.currentTarget.value);
              state.advanced[control.key] = nextValue;
              value.textContent = formatAdvancedValue(control, nextValue);
              queueRender();
            });

            field.appendChild(header);
            field.appendChild(input);
            wrapper.appendChild(field);
          });

          elements.advancedContent.appendChild(wrapper);
        });
      }

      function syncPresetSelection() {
        elements.presetGrid.querySelectorAll(".preset-option").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.preset === state.preset);
        });
      }

      function syncControlValues() {
        elements.sizePreset.value = state.sizePreset;
        elements.backgroundModeSelect.value = state.backgroundMode;
        elements.shapeModeSelect.value = state.shapeMode;
        elements.textureModeSelect.value = state.textureMode;
        elements.widthInput.value = String(state.width);
        elements.heightInput.value = String(state.height);
        elements.paletteSelect.value = state.palette;
        elements.densityInput.value = String(state.density);
        elements.complexityInput.value = String(state.complexity);
        elements.seedInput.value = String(state.seed);
        elements.densityValue.textContent = formatPercent(state.density);
        elements.complexityValue.textContent = formatPercent(state.complexity);
        elements.previewPresetLabel.textContent = getPresetLabel(state.preset);
        elements.previewSizeLabel.textContent = `${state.width} × ${state.height}`;
        elements.previewPaletteLabel.textContent = getCompositionSummary(state);
      }

      function mergePresetDefaults(presetKey, preservePalette = false) {
        const preset = presetDefinitions[presetKey];
        state = {
          ...state,
          preset: presetKey,
          backgroundMode: preset.backgroundMode,
          shapeMode: preset.shapeMode,
          textureMode: preset.textureMode,
          density: preset.defaults.density,
          complexity: preset.defaults.complexity,
          palette: preservePalette ? state.palette : preset.defaults.palette,
          advanced: buildAdvancedDefaults({
            presetKey,
            backgroundMode: preset.backgroundMode,
            shapeMode: preset.shapeMode,
            textureMode: preset.textureMode,
          }),
        };
      }

      function applyModeChange(modeKey, nextValue) {
        const nextAdvanced = {
          ...state.advanced,
          ...(modeKey === "backgroundMode" ? backgroundModes[nextValue]?.defaults : {}),
          ...(modeKey === "shapeMode" ? shapeModes[nextValue]?.defaults : {}),
          ...(modeKey === "textureMode" ? textureModes[nextValue]?.defaults : {}),
        };
        state = {
          ...state,
          preset: "custom",
          [modeKey]: nextValue,
          advanced: nextAdvanced,
        };
        syncPresetSelection();
        syncControlValues();
        renderAdvancedControls();
        queueRender();
        refreshCandidates({ silent: true });
      }

      function switchPreset(presetKey) {
        mergePresetDefaults(presetKey);
        syncPresetSelection();
        updateDerivedSizePreset();
        syncControlValues();
        renderAdvancedControls();
        setFeedback(`已切换到${presetDefinitions[presetKey].label}`, "success");
        queueRender();
        refreshCandidates({ silent: true });
      }

      function applySizePreset(value) {
        const preset = sizePresets.find((item) => item.value === value);
        if (!preset) {
          state.sizePreset = "custom";
          return;
        }
        state.width = preset.width;
        state.height = preset.height;
        state.sizePreset = preset.value;
        lastValidDimensions = { width: state.width, height: state.height };
        syncControlValues();
        queueRender();
      }

      function validateDimensionInput(fieldName) {
        const input = fieldName === "width" ? elements.widthInput : elements.heightInput;
        const parsed = Number(input.value);
        if (!Number.isFinite(parsed) || parsed < 320 || parsed > 6000) {
          input.value = String(lastValidDimensions[fieldName]);
          setFeedback(`${fieldName === "width" ? "宽度" : "高度"}需要在 320 到 6000 之间`, "error", 2600);
          return false;
        }
        const normalized = Math.round(parsed);
        state[fieldName] = normalized;
        lastValidDimensions[fieldName] = normalized;
        updateDerivedSizePreset();
        syncControlValues();
        return true;
      }

      function nextSeed() {
        return Math.floor(Date.now() % 1000000000) + 1;
      }

      function randomizeCurrentPreset() {
        const rng = makeRng(nextSeed());
        const groups = getCurrentAdvancedGroups(state);
        state.seed = Math.floor(rng() * 999999999) + 1;
        state.palette = choose(rng, Object.keys(palettes));
        state.density = Number((0.2 + rng() * 0.62).toFixed(2));
        state.complexity = Number((0.2 + rng() * 0.68).toFixed(2));
        const nextAdvanced = { ...state.advanced };
        groups.forEach((group) => {
          group.controls.forEach((control) => {
            const randomized = control.min + rng() * (control.max - control.min);
            nextAdvanced[control.key] = Number(randomized.toFixed(2));
          });
        });
        state.advanced = nextAdvanced;
        syncControlValues();
        renderAdvancedControls();
        queueRender();
      }

      function randomizeCurrentComposition() {
        randomizeCurrentPreset();
        refreshCandidates({ silent: true });
      }

      const mixCompatibility = {
        "minimal-form": {
          backgrounds: ["soft-atmosphere", "deep-cold", "warm-cool-split"],
          textures: ["light-grid", "satin-flow", "fine-grain"],
        },
        "soft-blocks": {
          backgrounds: ["warm-cool-split", "soft-atmosphere"],
          textures: ["fine-grain", "light-grid"],
        },
        "fluid-blobs": {
          backgrounds: ["soft-atmosphere", "deep-cold", "warm-cool-split"],
          textures: ["fine-grain", "none", "light-grid"],
        },
        "flow-ribbons": {
          backgrounds: ["soft-atmosphere", "warm-cool-split"],
          textures: ["fine-grain", "none"],
        },
        "reeded-column": {
          backgrounds: ["glass-diffuse", "soft-atmosphere"],
          textures: ["prism-glass", "fine-grain"],
        },
        "arched-pillars": {
          backgrounds: ["soft-atmosphere", "glass-diffuse", "deep-cold"],
          textures: ["light-grid", "fine-grain", "prism-glass"],
        },
        "mirror-slices": {
          backgrounds: ["deep-cold", "glass-diffuse", "warm-cool-split"],
          textures: ["prism-glass", "fine-grain", "light-grid"],
        },
        "orbital-tether": {
          backgrounds: ["warp-canopy", "deep-cold", "warm-cool-split"],
          textures: ["stardust-sparks", "fine-grain", "none"],
        },
      };

      function randomizeMix() {
        const rng = makeRng(nextSeed());
        const nextShapeMode = choose(rng, Object.keys(shapeModes));
        const compatibility = mixCompatibility[nextShapeMode] ?? {
          backgrounds: Object.keys(backgroundModes),
          textures: Object.keys(textureModes),
        };
        const nextBackgroundMode = choose(rng, compatibility.backgrounds);
        const nextTextureMode = choose(rng, compatibility.textures);
        state = {
          ...state,
          preset: "custom",
          backgroundMode: nextBackgroundMode,
          shapeMode: nextShapeMode,
          textureMode: nextTextureMode,
          seed: Math.floor(rng() * 999999999) + 1,
          palette: choose(rng, Object.keys(palettes)),
          density: Number((0.2 + rng() * 0.62).toFixed(2)),
          complexity: Number((0.2 + rng() * 0.68).toFixed(2)),
          advanced: buildAdvancedDefaults({
            backgroundMode: nextBackgroundMode,
            shapeMode: nextShapeMode,
            textureMode: nextTextureMode,
          }),
        };
        syncPresetSelection();
        syncControlValues();
        renderAdvancedControls();
        queueRender();
        refreshCandidates({ silent: true });
      }

      function resetCurrentPreset() {
        if (state.preset === "custom") {
          state = {
            ...state,
            advanced: buildAdvancedDefaults({
              backgroundMode: state.backgroundMode,
              shapeMode: state.shapeMode,
              textureMode: state.textureMode,
            }),
          };
        } else {
          const currentPreset = state.preset;
          mergePresetDefaults(currentPreset, false);
        }
        state.seed = 314159;
        state.width = lastValidDimensions.width;
        state.height = lastValidDimensions.height;
        state.sizePreset = findMatchingSizePreset(state.width, state.height);
        syncControlValues();
        renderAdvancedControls();
        queueRender();
        refreshCandidates({ silent: true });
        setFeedback(state.preset === "custom" ? "当前组合已恢复默认参数" : "当前预设已恢复默认参数", "success");
      }

      function cloneState(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function jitterControlValue(currentValue, control, rng, amount = 0.24) {
        const base = Number.isFinite(Number(currentValue))
          ? Number(currentValue)
          : (control.min + control.max) / 2;
        const span = control.max - control.min;
        return Number(clamp(base + (rng() - 0.5) * span * amount, control.min, control.max).toFixed(2));
      }

      function createCandidateState(index) {
        const rng = makeRng(state.seed + candidateNonce * 1009 + (index + 1) * 7919);
        const candidate = cloneState(state);
        const groups = getCurrentAdvancedGroups(candidate);
        const paletteKeys = Object.keys(palettes);
        const nextAdvanced = { ...candidate.advanced };

        candidate.seed = Math.floor(rng() * 999999999) + 1;
        candidate.density = Number(clamp(candidate.density + (rng() - 0.5) * 0.18, 0.18, 0.9).toFixed(2));
        candidate.complexity = Number(clamp(candidate.complexity + (rng() - 0.5) * 0.18, 0.16, 0.92).toFixed(2));

        if (index > 0 && rng() > 0.58) {
          candidate.palette = paletteKeys[(paletteKeys.indexOf(candidate.palette) + index + 1) % paletteKeys.length];
        }

        groups.forEach((group) => {
          group.controls.forEach((control) => {
            nextAdvanced[control.key] = jitterControlValue(nextAdvanced[control.key], control, rng, index === 0 ? 0.12 : 0.28);
          });
        });

        candidate.advanced = nextAdvanced;
        return candidate;
      }

      function renderCandidateTile(candidateState, index) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "candidate-option";
        button.setAttribute("aria-label", `应用候选 ${index + 1}`);

        const canvas = document.createElement("canvas");
        canvas.width = 144;
        canvas.height = 256;
        const ctx = canvas.getContext("2d", { alpha: false, willReadFrequently: true });
        renderArtwork(ctx, canvas.width, canvas.height, candidateState);

        const label = document.createElement("span");
        label.textContent = `方案 ${index + 1}`;

        button.appendChild(canvas);
        button.appendChild(label);
        button.addEventListener("click", () => applyCandidate(candidateState));
        return button;
      }

      function refreshCandidates({ silent = false } = {}) {
        candidateNonce += 1;
        candidateStates = Array.from({ length: 4 }, (_, index) => createCandidateState(index));
        elements.candidateStrip.innerHTML = "";
        candidateStates.forEach((candidateState, index) => {
          elements.candidateStrip.appendChild(renderCandidateTile(candidateState, index));
        });
        if (!silent) {
          setFeedback("精选候选已更新", "success");
        }
      }

      function applyCandidate(candidateState) {
        state = cloneState(candidateState);
        lastValidDimensions = { width: state.width, height: state.height };
        updateDerivedSizePreset();
        syncPresetSelection();
        syncControlValues();
        renderAdvancedControls();
        queueRender();
      }

      function line(ctx, x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      function hexToRgba(hex, alpha) {
        const clean = hex.replace("#", "");
        const normalized = clean.length === 3
          ? clean.split("").map((char) => char + char).join("")
          : clean;
        const red = Number.parseInt(normalized.slice(0, 2), 16);
        const green = Number.parseInt(normalized.slice(2, 4), 16);
        const blue = Number.parseInt(normalized.slice(4, 6), 16);
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function hexToUnitRgb(hex) {
        const clean = hex.replace("#", "");
        const normalized = clean.length === 3
          ? clean.split("").map((char) => char + char).join("")
          : clean;
        return [
          Number.parseInt(normalized.slice(0, 2), 16) / 255,
          Number.parseInt(normalized.slice(2, 4), 16) / 255,
          Number.parseInt(normalized.slice(4, 6), 16) / 255,
        ];
      }

      const reededShaderState = {
        renderer: null,
        failed: false,
        reason: "",
      };

      const reededShaderDebug = {
        forceFallback: false,
      };

      function createLayer(width, height) {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        return {
          canvas,
          ctx: canvas.getContext("2d", { alpha: true }),
        };
      }

      function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
          const info = gl.getShaderInfoLog(shader) || "shader compile failed";
          gl.deleteShader(shader);
          throw new Error(info);
        }
        return shader;
      }

      function createProgram(gl, vertexSource, fragmentSource) {
        const vertexShader = createShader(gl, gl.VERTEX_SHADER, vertexSource);
        const fragmentShader = createShader(gl, gl.FRAGMENT_SHADER, fragmentSource);
        const program = gl.createProgram();
        gl.attachShader(program, vertexShader);
        gl.attachShader(program, fragmentShader);
        gl.linkProgram(program);
        if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
          const info = gl.getProgramInfoLog(program) || "program link failed";
          gl.deleteProgram(program);
          gl.deleteShader(vertexShader);
          gl.deleteShader(fragmentShader);
          throw new Error(info);
        }
        gl.deleteShader(vertexShader);
        gl.deleteShader(fragmentShader);
        return program;
      }

      function createReededShaderRenderer() {
        const canvas = document.createElement("canvas");
        const gl = canvas.getContext("webgl", {
          alpha: false,
          antialias: false,
          depth: false,
          preserveDrawingBuffer: true,
          premultipliedAlpha: false,
          stencil: false,
        });
        if (!gl) {
          throw new Error("webgl unavailable");
        }

        const vertexSource = `
          attribute vec2 a_position;
          varying vec2 v_uv;

          void main() {
            v_uv = a_position * 0.5 + 0.5;
            gl_Position = vec4(a_position, 0.0, 1.0);
          }
        `;

        const fragmentSource = `
          precision highp float;

          varying vec2 v_uv;

          uniform sampler2D u_source;
          uniform vec2 u_resolution;
          uniform float u_ridgeDensity;
          uniform float u_ridgeBreath;
          uniform float u_refractionField;
          uniform float u_focusField;
          uniform float u_fieldBlend;
          uniform float u_glassDepth;
          uniform vec2 u_phase;
          uniform float u_focusCount;
          uniform vec4 u_focusZones[3];
          uniform vec3 u_surfaceColor;
          uniform vec3 u_accentColor;
          uniform vec3 u_inkColor;

          float gaussian(float distanceValue, float spread) {
            float safeSpread = max(spread, 0.001);
            return exp(-(distanceValue * distanceValue) / (2.0 * safeSpread * safeSpread));
          }

          void main() {
            vec2 uv = v_uv;
            float density = clamp(u_ridgeDensity, 0.0, 1.0);
            float ridgeSoftness = clamp(u_ridgeBreath, 0.0, 1.0);
            float refraction = clamp(u_refractionField, 0.0, 1.0);
            float focusStrength = clamp(u_focusField, 0.0, 1.0);
            float fieldBlend = clamp(u_fieldBlend, 0.0, 1.0);
            float glassDepth = clamp(u_glassDepth, 0.0, 1.0);

            float ridgeCount = mix(7.5, 15.5, density);
            float ridgeUnit = uv.x * ridgeCount + u_phase.y * 0.1591549;
            float ridgeCell = fract(ridgeUnit);
            float ridgeCenter = ridgeCell * 2.0 - 1.0;
            float cylinderFace = sqrt(max(0.0, 1.0 - ridgeCenter * ridgeCenter));
            float normalFloor = mix(0.54, 0.82, ridgeSoftness);
            float normalX = clamp(ridgeCenter / max(cylinderFace, normalFloor), -0.62, 0.62);

            float focusMask = 0.0;
            float focusDrift = 0.0;
            for (int i = 0; i < 3; i += 1) {
              float enabled = step(float(i) + 0.5, u_focusCount);
              vec4 zone = u_focusZones[i];
              float zoneX = gaussian(uv.x - zone.x, zone.y * (0.52 + fieldBlend * 0.28));
              float zoneY = 0.82 + 0.18 * gaussian(uv.y - (0.44 + 0.06 * float(i)), 0.38);
              float local = enabled * zoneX * zone.z * zoneY;
              focusMask += local;
              focusDrift += local * zone.w;
            }
            focusMask = clamp(focusMask, 0.0, 1.0);

            float amplitude = (0.0009 + refraction * 0.0048 + glassDepth * 0.0024) * (0.66 + focusMask * (0.14 + focusStrength * 0.05));
            float dispX = normalX * amplitude + focusDrift * (0.03 + glassDepth * 0.032);

            vec2 sampleUv = clamp(uv + vec2(dispX, 0.0), vec2(0.001), vec2(0.999));
            vec2 chroma = vec2(dispX, 0.0) * (0.08 + glassDepth * 0.12);
            float red = texture2D(u_source, clamp(sampleUv + chroma * 0.34, vec2(0.001), vec2(0.999))).r;
            float green = texture2D(u_source, sampleUv).g;
            float blue = texture2D(u_source, clamp(sampleUv - chroma * 0.28, vec2(0.001), vec2(0.999))).b;
            vec3 prismColor = vec3(red, green, blue);
            float satinBlur = 0.0007 + fieldBlend * 0.0014 + ridgeSoftness * 0.0011;
            vec3 centered = texture2D(u_source, sampleUv).rgb;
            vec3 satinColor = centered * 0.48
              + texture2D(u_source, clamp(sampleUv + vec2(satinBlur, 0.0), vec2(0.001), vec2(0.999))).rgb * 0.26
              + texture2D(u_source, clamp(sampleUv - vec2(satinBlur, 0.0), vec2(0.001), vec2(0.999))).rgb * 0.26;
            vec3 sourceColor = mix(prismColor, satinColor, 0.34 + fieldBlend * 0.3);

            float satinMod = 0.92 + 0.08 * sin(uv.x * 6.2831853 * 2.0 + 0.32);
            float ridgeHighlight = pow(cylinderFace, 1.62 + (1.0 - fieldBlend) * 0.18) * satinMod;
            float edgeLine = smoothstep(0.62, 0.92, abs(ridgeCenter)) * (1.0 - smoothstep(0.92, 1.0, abs(ridgeCenter)));
            edgeLine *= 0.28 + (1.0 - ridgeSoftness) * 0.18;
            float orderedCaustic = pow(cylinderFace, 6.2 + glassDepth * 2.4) * 0.58;
            float ridgeShadow = smoothstep(0.64, 1.0, abs(ridgeCenter)) * (0.12 + (1.0 - cylinderFace) * 0.12) * (0.62 - fieldBlend * 0.22);
            float glow = ridgeHighlight * (0.009 + refraction * 0.013 + glassDepth * 0.01)
              + edgeLine * (0.0015 + glassDepth * 0.003)
              + orderedCaustic * (0.002 + focusMask * 0.003 + glassDepth * 0.003)
              + focusMask * (0.011 + focusStrength * 0.016);
            float veil = 0.058 + fieldBlend * 0.088 + focusMask * 0.02;

            vec3 tint = mix(u_surfaceColor, u_accentColor, 0.28 + focusMask * 0.2);
            vec3 color = sourceColor;
            color += tint * glow;
            color += vec3(1.0, 0.94, 0.84) * edgeLine * (0.001 + glassDepth * 0.002);
            color += vec3(0.82, 0.92, 1.0) * orderedCaustic * (0.0015 + refraction * 0.003);
            color = mix(color, mix(color, tint, 0.14), veil * 0.46);
            color -= u_inkColor * ridgeShadow * (0.002 + (1.0 - fieldBlend) * 0.003 + glassDepth * 0.002);

            float contrast = 1.0 + refraction * 0.022 + focusMask * 0.018 + glassDepth * 0.006;
            color = (color - 0.5) * contrast + 0.5;
            color = clamp(color, 0.0, 1.0);

            gl_FragColor = vec4(color, 1.0);
          }
        `;

        const program = createProgram(gl, vertexSource, fragmentSource);
        const buffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
          -1, -1,
          1, -1,
          -1, 1,
          1, 1,
        ]), gl.STATIC_DRAW);

        const texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

        const attributeLocation = gl.getAttribLocation(program, "a_position");
        const uniforms = {
          source: gl.getUniformLocation(program, "u_source"),
          resolution: gl.getUniformLocation(program, "u_resolution"),
          ridgeDensity: gl.getUniformLocation(program, "u_ridgeDensity"),
          ridgeBreath: gl.getUniformLocation(program, "u_ridgeBreath"),
          refractionField: gl.getUniformLocation(program, "u_refractionField"),
          focusField: gl.getUniformLocation(program, "u_focusField"),
          fieldBlend: gl.getUniformLocation(program, "u_fieldBlend"),
          glassDepth: gl.getUniformLocation(program, "u_glassDepth"),
          phase: gl.getUniformLocation(program, "u_phase"),
          focusCount: gl.getUniformLocation(program, "u_focusCount"),
          focusZones: gl.getUniformLocation(program, "u_focusZones[0]"),
          surfaceColor: gl.getUniformLocation(program, "u_surfaceColor"),
          accentColor: gl.getUniformLocation(program, "u_accentColor"),
          inkColor: gl.getUniformLocation(program, "u_inkColor"),
        };

        const maxTextureSize = gl.getParameter(gl.MAX_TEXTURE_SIZE);

        return {
          canvas,
          gl,
          program,
          buffer,
          texture,
          attributeLocation,
          uniforms,
          maxTextureSize,
        };
      }

      function getReededShaderRenderer() {
        if (reededShaderState.failed) {
          return null;
        }
        if (reededShaderState.renderer) {
          return reededShaderState.renderer;
        }
        try {
          reededShaderState.renderer = createReededShaderRenderer();
          reededShaderState.reason = "";
        } catch (error) {
          reededShaderState.failed = true;
          reededShaderState.reason = error.message;
          return null;
        }
        return reededShaderState.renderer;
      }

      function renderReededGlassPass(sourceCanvas, targetCtx, width, height, palette, currentState, composition) {
        if (reededShaderDebug.forceFallback) {
          return false;
        }

        const renderer = getReededShaderRenderer();
        if (!renderer) {
          return false;
        }

        if (width > renderer.maxTextureSize || height > renderer.maxTextureSize) {
          return false;
        }

        const { canvas, gl, program, buffer, texture, attributeLocation, uniforms } = renderer;
        canvas.width = width;
        canvas.height = height;
        gl.viewport(0, 0, width, height);

        const focusData = new Float32Array(12);
        composition.focusZones.slice(0, 3).forEach((zone, index) => {
          const offset = index * 4;
          focusData[offset] = zone.x / Math.max(width, 1);
          focusData[offset + 1] = zone.width / Math.max(width, 1);
          focusData[offset + 2] = zone.intensity;
          focusData[offset + 3] = zone.drift / Math.max(width, 1);
        });

        try {
          gl.useProgram(program);
          gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
          gl.enableVertexAttribArray(attributeLocation);
          gl.vertexAttribPointer(attributeLocation, 2, gl.FLOAT, false, 0, 0);

          gl.activeTexture(gl.TEXTURE0);
          gl.bindTexture(gl.TEXTURE_2D, texture);
          gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, sourceCanvas);

          gl.uniform1i(uniforms.source, 0);
          gl.uniform2f(uniforms.resolution, width, height);
          gl.uniform1f(uniforms.ridgeDensity, currentState.advanced.ridgeDensity ?? 0.38);
          gl.uniform1f(uniforms.ridgeBreath, currentState.advanced.ridgeBreath ?? 0.6);
          gl.uniform1f(uniforms.refractionField, currentState.advanced.refractionField ?? 0.4);
          gl.uniform1f(uniforms.focusField, currentState.advanced.focusField ?? 0.5);
          gl.uniform1f(uniforms.fieldBlend, currentState.advanced.fieldBlend ?? 0.66);
          gl.uniform1f(uniforms.glassDepth, currentState.advanced.glassDepth ?? 0.52);
          gl.uniform2f(uniforms.phase, composition.basePhase, composition.refractionPhase);
          gl.uniform1f(uniforms.focusCount, Math.min(3, composition.focusZones.length));
          gl.uniform4fv(uniforms.focusZones, focusData);
          gl.uniform3fv(uniforms.surfaceColor, new Float32Array(hexToUnitRgb(palette.surface)));
          gl.uniform3fv(uniforms.accentColor, new Float32Array(hexToUnitRgb(palette.accentSoft)));
          gl.uniform3fv(uniforms.inkColor, new Float32Array(hexToUnitRgb(palette.ink)));

          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          targetCtx.drawImage(canvas, 0, 0, width, height);
          return true;
        } catch (error) {
          reededShaderState.failed = true;
          reededShaderState.reason = error.message;
          return false;
        }
      }

      function paintSoftEllipse(ctx, { x, y, rx, ry, rotation = 0, color, blur = 0, alpha = 1, composite = "source-over" }) {
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.beginPath();
        ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function paintSoftRoundedRect(ctx, { x, y, width, height, radius, color, blur = 0, alpha = 1, composite = "source-over", rotation = 0 }) {
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.translate(x + width / 2, y + height / 2);
        ctx.rotate(rotation);
        roundedRect(ctx, -width / 2, -height / 2, width, height, radius);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function paintCrispRoundedRect(ctx, { x, y, width, height, radius, fill = null, stroke = null, lineWidth = 1, rotation = 0, alpha = 1, composite = "source-over" }) {
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.translate(x + width / 2, y + height / 2);
        ctx.rotate(rotation);
        roundedRect(ctx, -width / 2, -height / 2, width, height, radius);
        if (fill) {
          ctx.fillStyle = fill;
          ctx.fill();
        }
        if (stroke) {
          ctx.lineWidth = lineWidth;
          ctx.strokeStyle = stroke;
          ctx.stroke();
        }
        ctx.restore();
      }

      function paintSoftRibbon(ctx, points, { color, lineWidth, blur = 0, alpha = 1, composite = "source-over" }) {
        if (points.length < 2) {
          return;
        }
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let index = 1; index < points.length; index += 1) {
          const previous = points[index - 1];
          const point = points[index];
          const midX = (previous.x + point.x) / 2;
          const midY = (previous.y + point.y) / 2;
          ctx.quadraticCurveTo(previous.x, previous.y, midX, midY);
        }
        const lastPoint = points[points.length - 1];
        ctx.lineTo(lastPoint.x, lastPoint.y);
        ctx.stroke();
        ctx.restore();
      }

      function paintGradientRibbon(ctx, points, { stops, lineWidth, blur = 0, alpha = 1, composite = "source-over" }) {
        if (points.length < 2) {
          return;
        }
        const first = points[0];
        const last = points[points.length - 1];
        const gradient = ctx.createLinearGradient(first.x, first.y, last.x, last.y);
        stops.forEach((stop) => gradient.addColorStop(stop.offset, stop.color));

        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.strokeStyle = gradient;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(first.x, first.y);
        for (let index = 1; index < points.length; index += 1) {
          const previous = points[index - 1];
          const point = points[index];
          const midX = (previous.x + point.x) / 2;
          const midY = (previous.y + point.y) / 2;
          ctx.quadraticCurveTo(previous.x, previous.y, midX, midY);
        }
        const lastPoint = points[points.length - 1];
        ctx.lineTo(lastPoint.x, lastPoint.y);
        ctx.stroke();
        ctx.restore();
      }

      function midpoint(pointA, pointB) {
        return {
          x: (pointA.x + pointB.x) * 0.5,
          y: (pointA.y + pointB.y) * 0.5,
        };
      }

      function paintSoftBlob(ctx, {
        x,
        y,
        rx,
        ry,
        rotation = 0,
        color,
        blur = 0,
        alpha = 1,
        composite = "source-over",
        roughness = 0.42,
        phaseA = 0,
        phaseB = 0,
        phaseC = 0,
      }) {
        const points = [];
        const steps = 24;
        for (let index = 0; index < steps; index += 1) {
          const angle = (index / steps) * Math.PI * 2;
          const wave = 1
            + Math.sin(angle * 2 + phaseA) * roughness * 0.18
            + Math.sin(angle * 3 + phaseB) * roughness * 0.12
            + Math.sin(angle * 5 + phaseC) * roughness * 0.08;
          points.push({
            x: Math.cos(angle) * rx * wave,
            y: Math.sin(angle) * ry * (1 + Math.sin(angle * 2 + phaseB) * roughness * 0.1),
          });
        }

        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        const firstMid = midpoint(points[0], points[1]);
        ctx.beginPath();
        ctx.moveTo(firstMid.x, firstMid.y);
        for (let index = 1; index <= points.length; index += 1) {
          const current = points[index % points.length];
          const next = points[(index + 1) % points.length];
          const nextMid = midpoint(current, next);
          ctx.quadraticCurveTo(current.x, current.y, nextMid.x, nextMid.y);
        }
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function paintSoftArch(ctx, {
        x,
        y,
        width,
        height,
        archRise = 0.58,
        rotation = 0,
        color,
        blur = 0,
        alpha = 1,
        composite = "source-over",
      }) {
        const halfWidth = width * 0.5;
        const halfHeight = height * 0.5;
        const shoulderY = -halfHeight + height * (0.26 + (1 - archRise) * 0.16);
        const apexY = -halfHeight + height * (0.04 + (1 - archRise) * 0.12);
        const controlY = apexY + height * (0.16 + (1 - archRise) * 0.08);

        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.translate(x + width * 0.5, y + height * 0.5);
        ctx.rotate(rotation);
        ctx.beginPath();
        ctx.moveTo(-halfWidth, halfHeight);
        ctx.lineTo(-halfWidth, shoulderY);
        ctx.quadraticCurveTo(-halfWidth * 0.92, controlY, 0, apexY);
        ctx.quadraticCurveTo(halfWidth * 0.92, controlY, halfWidth, shoulderY);
        ctx.lineTo(halfWidth, halfHeight);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function tracePolygon(ctx, points) {
        if (!points.length) {
          return;
        }
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let index = 1; index < points.length; index += 1) {
          ctx.lineTo(points[index].x, points[index].y);
        }
        ctx.closePath();
      }

      function linePoint(pointA, pointB, progress) {
        return {
          x: pointA.x + (pointB.x - pointA.x) * progress,
          y: pointA.y + (pointB.y - pointA.y) * progress,
        };
      }

      function rotatePoint(point, rotation) {
        return {
          x: point.x * Math.cos(rotation) - point.y * Math.sin(rotation),
          y: point.x * Math.sin(rotation) + point.y * Math.cos(rotation),
        };
      }

      function transformPoints(points, translateX, translateY, rotation = 0) {
        return points.map((point) => {
          const rotated = rotation === 0 ? point : rotatePoint(point, rotation);
          return {
            x: rotated.x + translateX,
            y: rotated.y + translateY,
          };
        });
      }

      function gaussianInfluence(position, center, radius) {
        const safeRadius = Math.max(1, radius);
        const delta = (position - center) / safeRadius;
        return Math.exp(-(delta * delta));
      }

      function drawGridPattern(ctx, width, height, spacing, color, alpha) {
        ctx.save();
        ctx.strokeStyle = hexToRgba(color, alpha);
        ctx.lineWidth = 1;
        for (let x = 0; x <= width; x += spacing) {
          line(ctx, x, 0, x, height);
        }
        for (let y = 0; y <= height; y += spacing) {
          line(ctx, 0, y, width, y);
        }
        ctx.restore();
      }

      function drawSatinFlowTexture(ctx, width, height, palette, currentState, rng) {
        const strength = currentState.advanced.patternStrength ?? 0.44;
        const scale = currentState.advanced.satinScale ?? 0.62;
        const bandCount = 3 + Math.round(strength * 3);
        const amplitude = height * (0.024 + scale * 0.06);
        const layer = createLayer(width, height);

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "screen";
        for (let band = 0; band < bandCount; band += 1) {
          const progress = bandCount === 1 ? 0.5 : band / (bandCount - 1);
          const baseY = height * (0.18 + progress * 0.62) + (rng() - 0.5) * height * 0.08;
          const phase = rng() * Math.PI * 2;
          const tilt = (rng() - 0.5) * height * 0.12;
          const points = [];

          for (let step = 0; step <= 8; step += 1) {
            const t = step / 8;
            const slowWave = Math.sin(t * Math.PI * (0.85 + scale * 1.1) + phase) * amplitude;
            const fineWave = Math.sin(t * Math.PI * (2.1 + strength * 1.2) + phase * 0.45) * amplitude * 0.24;
            points.push({
              x: width * (-0.08 + t * 1.16),
              y: baseY + slowWave + fineWave + (t - 0.5) * tilt,
            });
          }

          paintGradientRibbon(layer.ctx, points, {
            stops: [
              { offset: 0, color: "rgba(255, 255, 255, 0)" },
              { offset: 0.24, color: hexToRgba(palette.accentSoft, 0.034 + strength * 0.07) },
              { offset: 0.52, color: `rgba(255, 255, 255, ${0.026 + strength * 0.06})` },
              { offset: 0.78, color: hexToRgba(palette.surface, 0.024 + strength * 0.05) },
              { offset: 1, color: "rgba(255, 255, 255, 0)" },
            ],
            lineWidth: width * (0.035 + strength * 0.052) * (0.82 + rng() * 0.36),
            blur: width * (0.009 + (1 - scale) * 0.017),
            composite: "screen",
          });
        }
        layer.ctx.restore();

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "soft-light";
        const horizontalSheen = layer.ctx.createLinearGradient(0, 0, width, 0);
        horizontalSheen.addColorStop(0, hexToRgba(palette.ink, 0.05 + strength * 0.04));
        horizontalSheen.addColorStop(0.28, `rgba(255, 255, 255, ${0.018 + strength * 0.035})`);
        horizontalSheen.addColorStop(0.52, hexToRgba(palette.accentSoft, 0.02 + strength * 0.035));
        horizontalSheen.addColorStop(0.76, `rgba(255, 255, 255, ${0.012 + strength * 0.026})`);
        horizontalSheen.addColorStop(1, hexToRgba(palette.ink, 0.04 + strength * 0.035));
        layer.ctx.fillStyle = horizontalSheen;
        layer.ctx.fillRect(0, 0, width, height);
        layer.ctx.restore();

        const film = document.createElement("canvas");
        film.width = 84;
        film.height = 148;
        const filmCtx = film.getContext("2d", { alpha: true });
        const filmData = filmCtx.createImageData(film.width, film.height);
        for (let index = 0; index < filmData.data.length; index += 4) {
          const value = 82 + Math.floor(rng() * 120);
          filmData.data[index] = value;
          filmData.data[index + 1] = value;
          filmData.data[index + 2] = value;
          filmData.data[index + 3] = 12 + Math.floor(strength * 34);
        }
        filmCtx.putImageData(filmData, 0, 0);

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "soft-light";
        layer.ctx.globalAlpha = 0.18 + strength * 0.18;
        layer.ctx.imageSmoothingEnabled = true;
        layer.ctx.filter = `blur(${Math.max(1, width * 0.0014)}px)`;
        layer.ctx.drawImage(film, 0, 0, width, height);
        layer.ctx.restore();

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "multiply";
        for (let band = 0; band < 2; band += 1) {
          const baseY = height * (0.34 + band * 0.24) + (rng() - 0.5) * height * 0.08;
          const points = [];
          const phase = rng() * Math.PI * 2;
          for (let step = 0; step <= 7; step += 1) {
            const t = step / 7;
            points.push({
              x: width * (-0.05 + t * 1.1),
              y: baseY + Math.sin(t * Math.PI * (1.2 + scale) + phase) * amplitude * 0.48,
            });
          }
          paintSoftRibbon(layer.ctx, points, {
            color: hexToRgba(palette.ink, 0.018 + strength * 0.04),
            lineWidth: width * (0.055 + strength * 0.05),
            blur: width * (0.026 + scale * 0.018),
            composite: "multiply",
          });
        }
        layer.ctx.restore();

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawReededGlassPattern(ctx, width, height, palette, density, contrast) {
        const step = width * (0.018 + (1 - density) * 0.028);
        const ridgeWidth = step * 0.92;
        ctx.save();
        ctx.globalCompositeOperation = "soft-light";
        for (let x = -ridgeWidth; x < width + ridgeWidth; x += step) {
          const gradient = ctx.createLinearGradient(x, 0, x + ridgeWidth, 0);
          gradient.addColorStop(0, hexToRgba(palette.ink, 0.09 + contrast * 0.11));
          gradient.addColorStop(0.16, hexToRgba(palette.surface, 0.05 + contrast * 0.05));
          gradient.addColorStop(0.38, `rgba(255, 255, 255, ${0.05 + contrast * 0.1})`);
          gradient.addColorStop(0.52, `rgba(255, 255, 255, ${0.12 + contrast * 0.18})`);
          gradient.addColorStop(0.7, hexToRgba(palette.accentSoft, 0.06 + contrast * 0.07));
          gradient.addColorStop(1, hexToRgba(palette.ink, 0.04 + contrast * 0.06));
          ctx.fillStyle = gradient;
          ctx.fillRect(x, 0, ridgeWidth, height);
        }
        ctx.restore();

        ctx.save();
        ctx.strokeStyle = hexToRgba(palette.ink, 0.04 + contrast * 0.11);
        ctx.lineWidth = 1;
        for (let x = 0; x <= width; x += step) {
          line(ctx, x, 0, x, height);
        }
        ctx.restore();
      }

      function drawPrismTexture(ctx, width, height, palette, density, strength, rng) {
        const stepX = width * (0.028 + (1 - density) * 0.04);
        const depth = strength ?? 0.24;
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        for (let x = -stepX; x < width + stepX * 2; x += stepX) {
          const highlight = ctx.createLinearGradient(x, 0, x + stepX, 0);
          highlight.addColorStop(0, hexToRgba(palette.surface, 0));
          highlight.addColorStop(0.24, `rgba(255, 255, 255, ${0.005 + depth * 0.018})`);
          highlight.addColorStop(0.5, hexToRgba(palette.accentSoft, 0.008 + depth * 0.022));
          highlight.addColorStop(0.78, `rgba(255, 255, 255, ${0.004 + depth * 0.012})`);
          highlight.addColorStop(1, hexToRgba(palette.surface, 0));
          ctx.fillStyle = highlight;
          ctx.fillRect(x, 0, stepX, height);
        }

        ctx.restore();
      }

      function drawFineSurfaceGrain(ctx, width, height, palette, currentState, rng) {
        const amount = 0.00008 + (currentState.advanced.grainFine ?? 0.16) * 0.00024 + currentState.complexity * 0.00008;
        const dots = Math.round(width * height * amount);
        ctx.save();
        for (let index = 0; index < dots; index += 1) {
          const alpha = 0.012 + rng() * 0.034;
          const useLight = rng() > 0.52;
          ctx.fillStyle = useLight ? `rgba(255, 255, 255, ${alpha})` : hexToRgba(palette.ink, alpha * 0.8);
          ctx.fillRect(rng() * width, rng() * height, 0.6 + rng() * 1.2, 0.6 + rng() * 1.2);
        }
        ctx.restore();
      }

      function applySubtleGradientDither(ctx, width, height, strength, seed) {
        const intensity = clamp(strength, 0, 2.2);
        if (intensity <= 0) {
          return;
        }

        const image = ctx.getImageData(0, 0, width, height);
        const data = image.data;
        const baseSeed = normalizeSeed(seed);

        for (let offset = 0, pixel = 0; offset < data.length; offset += 4, pixel += 1) {
          const x = pixel % width;
          const y = Math.floor(pixel / width);
          let hash = Math.imul((x + baseSeed) | 0, 374761393) ^ Math.imul((y - baseSeed) | 0, 668265263);
          hash = (hash ^ (hash >>> 13)) >>> 0;
          hash = Math.imul(hash, 1274126177) >>> 0;
          hash = (hash ^ (hash >>> 16)) >>> 0;
          const randomNoise = (hash / 4294967295) - 0.5;
          const orderedNoise = ((((x & 3) + ((y & 3) << 2)) / 15) - 0.5) * 0.36;
          const noise = (randomNoise + orderedNoise) * intensity;

          data[offset] = clamp(data[offset] + noise, 0, 255);
          data[offset + 1] = clamp(data[offset + 1] + noise * 0.94, 0, 255);
          data[offset + 2] = clamp(data[offset + 2] + noise * 1.08, 0, 255);
        }

        ctx.putImageData(image, 0, 0);
      }

      function drawAtmosphericDepth(ctx, width, height, palette, currentState) {
        const contrast = currentState.advanced.tonalSplit ?? 0.58;
        const glow = currentState.advanced.glowRadius ?? 0.52;
        const drift = currentState.advanced.lightDrift ?? 0.5;
        const shade = ctx.createLinearGradient(width * 0.16, height * 0.05, width * 0.88, height * 0.98);
        shade.addColorStop(0, hexToRgba(palette.ink, 0.02));
        shade.addColorStop(0.56, hexToRgba(palette.ink, 0.018 + contrast * 0.026));
        shade.addColorStop(1, hexToRgba(palette.ink, 0.095 + contrast * 0.07));
        ctx.save();
        ctx.globalCompositeOperation = "multiply";
        ctx.fillStyle = shade;
        ctx.fillRect(0, 0, width, height);
        ctx.restore();

        paintSoftEllipse(ctx, {
          x: width * (0.46 + (drift - 0.5) * 0.1),
          y: height * 0.48,
          rx: width * (0.3 + glow * 0.18),
          ry: height * (0.16 + glow * 0.08),
          rotation: -0.04,
          color: `rgba(255, 255, 255, ${0.025 + glow * 0.028})`,
          blur: width * (0.055 + glow * 0.035),
          composite: "soft-light",
        });
        paintSoftEllipse(ctx, {
          x: width * (0.18 + drift * 0.12),
          y: height * 0.82,
          rx: width * (0.24 + glow * 0.12),
          ry: height * 0.12,
          rotation: -0.08,
          color: hexToRgba(palette.accent, 0.04 + glow * 0.035),
          blur: width * 0.075,
          composite: "screen",
        });
      }

      function drawMinimalFinishing(ctx, width, height, palette, currentState) {
        const glow = currentState.advanced.glowRadius ?? 0.55;
        const split = currentState.advanced.tonalSplit ?? 0.5;
        paintSoftEllipse(ctx, {
          x: width * 0.6,
          y: height * 0.42,
          rx: width * 0.2,
          ry: height * 0.34,
          rotation: -0.06,
          color: `rgba(255, 255, 255, ${0.08 + glow * 0.08})`,
          blur: width * 0.045,
          composite: "screen",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.55,
          y: height * 0.64,
          rx: width * 0.18,
          ry: height * 0.24,
          rotation: 0.12,
          color: hexToRgba(palette.ink, 0.08 + split * 0.05),
          blur: width * 0.035,
          composite: "multiply",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.52,
          y: height * 0.54,
          rx: width * 0.16,
          ry: height * 0.32,
          rotation: -0.08,
          color: hexToRgba(palette.ink, 0.035 + split * 0.025),
          blur: width * 0.04,
          composite: "multiply",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.56,
          y: height * 0.78,
          rx: width * 0.16,
          ry: height * 0.08,
          rotation: -0.12,
          color: hexToRgba(palette.ink, 0.075),
          blur: width * 0.032,
          composite: "multiply",
        });
      }

      function drawFlowFinishing(ctx, width, height, palette, currentState, rng) {
        const drift = currentState.advanced.drift ?? 0.58;
        const stretch = currentState.advanced.stretch ?? 0.58;
        for (let index = 0; index < 3; index += 1) {
          const y = height * (0.26 + index * 0.2 + (rng() - 0.5) * 0.04);
          paintGradientRibbon(ctx, [
            { x: width * -0.06, y },
            { x: width * 0.18, y: y - height * (0.08 + drift * 0.06) },
            { x: width * 0.46, y: y + height * (0.08 + stretch * 0.08) },
            { x: width * 1.02, y: y - height * 0.03 },
          ], {
            stops: [
              { offset: 0, color: hexToRgba(index % 2 === 0 ? palette.accent : palette.surface, 0) },
              { offset: 0.5, color: hexToRgba(index % 2 === 0 ? palette.accent : palette.surface, 0.09 + currentState.complexity * 0.05) },
              { offset: 1, color: hexToRgba(palette.ink, 0) },
            ],
            lineWidth: width * (0.028 + currentState.density * 0.018),
            blur: width * (0.01 + currentState.advanced.softness * 0.012),
            composite: index % 2 === 0 ? "screen" : "soft-light",
          });
        }

        paintSoftEllipse(ctx, {
          x: width * 0.42,
          y: height * 0.66,
          rx: width * 0.36,
          ry: height * 0.18,
          rotation: -0.22,
          color: hexToRgba(palette.ink, 0.09 + currentState.advanced.tonalSplit * 0.045),
          blur: width * 0.056,
          composite: "multiply",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.62,
          y: height * 0.34,
          rx: width * 0.26,
          ry: height * 0.16,
          rotation: 0.18,
          color: `rgba(255, 255, 255, ${0.12 + currentState.advanced.glowRadius * 0.07})`,
          blur: width * 0.045,
          composite: "screen",
        });
      }

      function drawBlockFinishing(ctx, width, height, palette, currentState) {
        paintSoftEllipse(ctx, {
          x: width * 0.68,
          y: height * 0.28,
          rx: width * 0.2,
          ry: height * 0.18,
          rotation: 0.18,
          color: hexToRgba(palette.ink, 0.08 + currentState.advanced.tonalSplit * 0.06),
          blur: width * 0.032,
          composite: "multiply",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.22,
          y: height * 0.7,
          rx: width * 0.28,
          ry: height * 0.12,
          rotation: -0.18,
          color: hexToRgba(palette.accent, 0.12 + currentState.advanced.tonalSplit * 0.06),
          blur: width * 0.028,
          composite: "screen",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.42,
          y: height * 0.56,
          rx: width * 0.36,
          ry: height * 0.16,
          rotation: -0.08,
          color: hexToRgba(palette.accent, 0.08 + currentState.advanced.tonalSplit * 0.045),
          blur: width * 0.06,
          composite: "screen",
        });
        paintSoftEllipse(ctx, {
          x: width * 0.64,
          y: height * 0.3,
          rx: width * 0.3,
          ry: height * 0.11,
          rotation: 0.04,
          color: hexToRgba(palette.ink, 0.035 + currentState.advanced.tonalSplit * 0.025),
          blur: width * 0.052,
          composite: "multiply",
        });
      }

      function drawArtworkFinishingPass(ctx, width, height, palette, currentState, rng) {
        if (currentState.shapeMode !== "reeded-column" && currentState.backgroundMode !== "warp-canopy") {
          drawAtmosphericDepth(ctx, width, height, palette, currentState);
        }

        if (currentState.shapeMode === "minimal-form") {
          drawMinimalFinishing(ctx, width, height, palette, currentState);
        }
        if (currentState.shapeMode === "soft-blocks") {
          drawBlockFinishing(ctx, width, height, palette, currentState);
        }
        if (currentState.shapeMode === "flow-ribbons" || currentState.shapeMode === "fluid-blobs") {
          drawFlowFinishing(ctx, width, height, palette, currentState, rng);
        }

        const edge = ctx.createRadialGradient(width * 0.52, height * 0.45, width * 0.08, width * 0.52, height * 0.45, width * 0.86);
        edge.addColorStop(0, hexToRgba(palette.ink, 0));
        edge.addColorStop(1, hexToRgba(palette.ink, 0.05 + currentState.complexity * 0.05));
        ctx.save();
        ctx.globalCompositeOperation = "multiply";
        ctx.fillStyle = edge;
        ctx.fillRect(0, 0, width, height);
        ctx.restore();

        drawFineSurfaceGrain(ctx, width, height, palette, currentState, rng);
        if (currentState.backgroundMode === "warp-canopy" || currentState.textureMode === "stardust-sparks") {
          applySubtleGradientDither(ctx, width, height, 2.1 + (currentState.advanced.grainFine ?? 0.12) * 1.4, currentState.seed + 8419);
        }
      }

      function getWarpAngleRadians(currentState) {
        const value = currentState.advanced.warpAngle ?? 0.66;
        return ((12 + value * 54) * Math.PI) / 180;
      }

      function drawWarpCanopyBackground(ctx, width, height, palette, currentState, rng) {
        const warpAngle = getWarpAngleRadians(currentState);
        const warpDensity = currentState.advanced.warpDensity ?? 0.62;
        const flareIntensity = currentState.advanced.flareIntensity ?? 0.64;
        const softness = currentState.advanced.softness ?? 0.46;

        const baseGradient = ctx.createLinearGradient(0, 0, width * 0.82, height);
        baseGradient.addColorStop(0, palette.backgroundA);
        baseGradient.addColorStop(0.26, hexToRgba(palette.accentSoft, 0.18));
        baseGradient.addColorStop(0.52, hexToRgba(palette.accent, 0.08));
        baseGradient.addColorStop(1, palette.backgroundB);
        ctx.fillStyle = baseGradient;
        ctx.fillRect(0, 0, width, height);

        const depthGlow = ctx.createRadialGradient(width * 0.2, height * 0.24, 0, width * 0.2, height * 0.24, width * 0.94);
        depthGlow.addColorStop(0, hexToRgba(palette.accent, 0.12 + flareIntensity * 0.07));
        depthGlow.addColorStop(0.52, hexToRgba(palette.accentSoft, 0.03 + flareIntensity * 0.025));
        depthGlow.addColorStop(1, hexToRgba(palette.accent, 0));
        ctx.fillStyle = depthGlow;
        ctx.fillRect(0, 0, width, height);

        const layer = createLayer(width, height);
        layer.ctx.globalCompositeOperation = "screen";

        for (let index = 0; index < 6; index += 1) {
          const accentMix = rng();
          const cloudColor = accentMix > 0.76
            ? palette.accentSoft
            : accentMix > 0.38
              ? palette.accent
              : palette.surface;
          paintSoftEllipse(layer.ctx, {
            x: width * (0.08 + rng() * 0.84),
            y: height * (0.08 + rng() * 0.84),
            rx: width * (0.08 + rng() * 0.18 + warpDensity * 0.04),
            ry: height * (0.05 + rng() * 0.14 + flareIntensity * 0.035),
            rotation: (rng() - 0.5) * 0.4,
            color: hexToRgba(cloudColor, 0.012 + flareIntensity * 0.026),
            blur: width * (0.052 + rng() * 0.052 + softness * 0.04),
            composite: "screen",
          });
        }

        for (let index = 0; index < 3; index += 1) {
          const progress = index / 2;
          paintSoftEllipse(layer.ctx, {
            x: width * (0.24 + progress * 0.28),
            y: height * (0.66 - progress * 0.18),
            rx: width * (0.28 + flareIntensity * 0.14),
            ry: height * (0.12 + progress * 0.05 + softness * 0.05),
            rotation: -0.1 + progress * 0.08,
            color: hexToRgba(index === 1 ? palette.surface : palette.accent, 0.038 + flareIntensity * 0.028),
            blur: width * (0.1 + softness * 0.056),
            composite: "screen",
          });
        }

        for (let index = 0; index < 3; index += 1) {
          const progress = index / 2;
          paintSoftEllipse(layer.ctx, {
            x: width * (0.16 + progress * 0.64) + (rng() - 0.5) * width * 0.1,
            y: height * (0.22 + progress * 0.56) + (rng() - 0.5) * height * 0.14,
            rx: width * (0.18 + flareIntensity * 0.14 + rng() * 0.08),
            ry: height * (0.12 + flareIntensity * 0.1 + rng() * 0.05),
            rotation: warpAngle,
            color: hexToRgba(index % 2 === 0 ? palette.accent : palette.surface, 0.045 + flareIntensity * 0.04),
            blur: width * (0.095 + flareIntensity * 0.07),
            composite: "screen",
          });
        }

        for (let index = 0; index < 7; index += 1) {
          paintSoftEllipse(layer.ctx, {
            x: rng() * width,
            y: rng() * height,
            rx: width * (0.035 + rng() * 0.06),
            ry: height * (0.025 + rng() * 0.055),
            rotation: (rng() - 0.5) * 0.5,
            color: hexToRgba(index % 2 === 0 ? palette.accentSoft : palette.surface, 0.018 + rng() * 0.028),
            blur: width * (0.028 + rng() * 0.034),
            composite: "screen",
          });
        }

        paintGradientRibbon(layer.ctx, [
          { x: width * -0.1, y: height * 0.62 },
          { x: width * 0.18, y: height * 0.54 },
          { x: width * 0.48, y: height * 0.62 },
          { x: width * 1.08, y: height * 0.5 },
        ], {
          stops: [
            { offset: 0, color: hexToRgba(palette.surface, 0) },
            { offset: 0.45, color: hexToRgba(palette.surface, 0.032 + flareIntensity * 0.028) },
            { offset: 1, color: hexToRgba(palette.accentSoft, 0) },
          ],
          lineWidth: width * (0.2 + flareIntensity * 0.08),
          blur: width * (0.08 + flareIntensity * 0.04),
          composite: "screen",
        });

        ctx.drawImage(layer.canvas, 0, 0);
        addVignette(ctx, width, height, palette.ink, 0.22 + warpDensity * 0.18);
      }

      function addVignette(ctx, width, height, color, strength) {
        const vignette = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.1, width * 0.5, height * 0.5, width * 0.82);
        vignette.addColorStop(0, hexToRgba(color, 0));
        vignette.addColorStop(1, hexToRgba(color, strength));
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);
      }

      function drawBackground(ctx, width, height, palette, currentState, rng) {
        if (currentState.backgroundMode === "warp-canopy") {
          drawWarpCanopyBackground(ctx, width, height, palette, currentState, rng);
          return;
        }

        const driftBase = currentState.advanced.lightDrift ?? 0.42;
        const gradient = ctx.createLinearGradient(0, 0, width * (0.4 + driftBase * 0.35), height);
        gradient.addColorStop(0, palette.backgroundA);
        gradient.addColorStop(1, palette.backgroundB);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        const haloX = width * (0.22 + rng() * 0.16);
        const haloY = height * (0.2 + rng() * 0.18);
        const halo = ctx.createRadialGradient(haloX, haloY, 0, haloX, haloY, Math.max(width, height) * 0.78);
        const baseHaloAlpha = currentState.backgroundMode === "deep-cold"
          ? 0.14
          : currentState.backgroundMode === "glass-diffuse"
            ? 0.24
            : 0.34;
        halo.addColorStop(0, hexToRgba(palette.accentSoft, baseHaloAlpha));
        halo.addColorStop(1, hexToRgba(palette.accentSoft, 0));
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, width, height);

        if (currentState.backgroundMode === "deep-cold") {
          const glow = ctx.createRadialGradient(width * 0.74, height * 0.26, 0, width * 0.74, height * 0.26, width * 0.74);
          glow.addColorStop(0, hexToRgba(palette.surface, 0.22));
          glow.addColorStop(1, hexToRgba(palette.surface, 0));
          ctx.fillStyle = glow;
          ctx.fillRect(0, 0, width, height);
          ctx.fillStyle = hexToRgba(palette.ink, 0.12);
          ctx.fillRect(0, 0, width, height);
        } else if (currentState.backgroundMode === "glass-diffuse") {
          const warmGlow = ctx.createRadialGradient(width * 0.24, height * 0.18, 0, width * 0.24, height * 0.18, width * 0.74);
          warmGlow.addColorStop(0, hexToRgba(palette.accent, 0.3));
          warmGlow.addColorStop(1, hexToRgba(palette.accent, 0));
          ctx.fillStyle = warmGlow;
          ctx.fillRect(0, 0, width, height);

          const coolGlow = ctx.createRadialGradient(width * 0.72, height * 0.84, 0, width * 0.72, height * 0.84, width * 0.78);
          coolGlow.addColorStop(0, hexToRgba(palette.accentSoft, 0.24));
          coolGlow.addColorStop(1, hexToRgba(palette.accentSoft, 0));
          ctx.fillStyle = coolGlow;
          ctx.fillRect(0, 0, width, height);

          const coreGlow = ctx.createRadialGradient(width * 0.6, height * 0.5, 0, width * 0.6, height * 0.5, width * 0.46);
          coreGlow.addColorStop(0, hexToRgba(palette.surface, 0.32));
          coreGlow.addColorStop(1, hexToRgba(palette.surface, 0));
          ctx.fillStyle = coreGlow;
          ctx.fillRect(0, 0, width, height);

          ctx.fillStyle = hexToRgba(palette.ink, 0.06);
          ctx.fillRect(0, 0, width, height);
        } else if (currentState.backgroundMode === "warm-cool-split") {
          const warmGlow = ctx.createRadialGradient(width * 0.22, height * 0.28, 0, width * 0.22, height * 0.28, width * 0.62);
          warmGlow.addColorStop(0, hexToRgba(palette.accent, 0.22 + (currentState.advanced.tonalSplit ?? 0.58) * 0.08));
          warmGlow.addColorStop(1, hexToRgba(palette.accent, 0));
          ctx.fillStyle = warmGlow;
          ctx.fillRect(0, 0, width, height);

          const coolGlow = ctx.createRadialGradient(width * 0.74, height * 0.74, 0, width * 0.74, height * 0.74, width * 0.66);
          coolGlow.addColorStop(0, hexToRgba(palette.surface, 0.18 + (currentState.advanced.haze ?? 0.18) * 0.16));
          coolGlow.addColorStop(1, hexToRgba(palette.surface, 0));
          ctx.fillStyle = coolGlow;
          ctx.fillRect(0, 0, width, height);

          ctx.fillStyle = hexToRgba(palette.ink, 0.05);
          ctx.fillRect(0, 0, width, height);
        } else {
          ctx.fillStyle = hexToRgba(palette.ink, 0.035);
          ctx.fillRect(0, 0, width, height);
        }
      }

      function drawMinimalGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const blur = width * (0.045 + currentState.advanced.softness * 0.11 + currentState.advanced.glowRadius * 0.035);
        const extraShapes = Math.round(currentState.advanced.shapeCount * 2 + currentState.density * 2);
        paintSoftEllipse(layer.ctx, {
          x: width * 0.68,
          y: height * 0.34,
          rx: width * (0.18 + currentState.complexity * 0.04),
          ry: height * 0.28,
          rotation: -0.24,
          color: hexToRgba(palette.surface, 0.98),
          blur: blur * 0.54,
        });
        paintSoftRoundedRect(layer.ctx, {
          x: width * 0.5,
          y: height * 0.44,
          width: width * 0.28,
          height: height * 0.48,
          radius: width * 0.14,
          rotation: -0.1,
          color: hexToRgba(palette.ink, 0.52),
          blur: blur * 0.24,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.72,
          y: height * 0.72,
          rx: width * 0.14,
          ry: height * 0.2,
          rotation: -0.08,
          color: hexToRgba(palette.surface, 0.66),
          blur: blur * 0.4,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.28,
          y: height * 0.66,
          rx: width * 0.2,
          ry: height * 0.18,
          rotation: 0.56,
          color: hexToRgba(palette.accentSoft, 0.94),
          blur: blur * 0.78,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.18,
          y: height * 0.18,
          rx: width * 0.22,
          ry: height * 0.18,
          rotation: -0.24,
          color: hexToRgba(palette.accent, 0.2),
          blur: blur * 0.9,
        });
        for (let index = 0; index < extraShapes; index += 1) {
          paintSoftEllipse(layer.ctx, {
            x: width * (0.18 + rng() * 0.64),
            y: height * (0.16 + rng() * 0.68),
            rx: width * (0.08 + rng() * 0.12),
            ry: height * (0.08 + rng() * 0.14),
            rotation: rng() * Math.PI,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.32),
            blur: blur * (0.7 + rng() * 0.35),
          });
        }
        ctx.drawImage(layer.canvas, 0, 0);
        addVignette(ctx, width, height, palette.ink, 0.05 + currentState.complexity * 0.04);
      }

      function drawBlockGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const shapeCount = 2 + Math.round(currentState.advanced.shapeCount * 3 + currentState.density * 1.5);
        const blur = width * (0.03 + currentState.advanced.softness * 0.09);
        paintSoftRoundedRect(layer.ctx, {
          x: width * 0.06,
          y: height * 0.52,
          width: width * 0.42,
          height: height * 0.24,
          radius: width * 0.12,
          rotation: -0.08,
          color: hexToRgba(palette.accent, 0.88),
          blur,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.74,
          y: height * 0.3,
          rx: width * 0.18,
          ry: height * 0.18,
          color: hexToRgba(palette.surface, 0.84),
          blur: blur * (0.9 + currentState.advanced.glowRadius * 0.45),
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.5,
          y: height * 0.76,
          rx: width * 0.24,
          ry: height * 0.12,
          color: hexToRgba(palette.accentSoft, 0.88),
          blur: blur * (0.82 + (currentState.advanced.haze ?? 0.18) * 0.6),
        });
        for (let index = 0; index < shapeCount; index += 1) {
          paintSoftRoundedRect(layer.ctx, {
            x: width * (0.1 + rng() * 0.55),
            y: height * (0.1 + rng() * 0.65),
            width: width * (0.14 + rng() * 0.16),
            height: height * (0.08 + rng() * 0.12),
            radius: width * (0.08 + currentState.advanced.softness * 0.1),
            rotation: (rng() - 0.5) * currentState.advanced.offsetPull,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accent, 0.32 + currentState.advanced.tonalSplit * 0.14),
            blur: blur * (0.6 + rng() * 0.5),
          });
        }
        ctx.drawImage(layer.canvas, 0, 0);
        addVignette(ctx, width, height, palette.ink, 0.09 + currentState.advanced.tonalSplit * 0.14);
      }

      function drawTechGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const blur = width * (0.04 + currentState.advanced.softness * 0.08 + currentState.advanced.glowRadius * 0.05);
        const shapeCount = 2 + Math.round(currentState.advanced.shapeCount * 2);
        paintSoftEllipse(layer.ctx, {
          x: width * 0.5,
          y: height * 0.34,
          rx: width * 0.26,
          ry: height * 0.3,
          color: hexToRgba(palette.surface, 0.96),
          blur,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.22,
          y: height * 0.62,
          rx: width * 0.16,
          ry: height * 0.15,
          color: hexToRgba(palette.accent, 0.95),
          blur: blur * 0.88,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.76,
          y: height * 0.58,
          rx: width * 0.2,
          ry: height * 0.18,
          color: hexToRgba(palette.accent, 0.88),
          blur: blur * 0.94,
        });
        for (let index = 0; index < shapeCount; index += 1) {
          paintSoftEllipse(layer.ctx, {
            x: width * (0.18 + rng() * 0.64),
            y: height * (0.18 + rng() * 0.58),
            rx: width * (0.08 + rng() * 0.1),
            ry: height * (0.08 + rng() * 0.12),
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.28),
            blur: blur * (0.72 + rng() * 0.36),
          });
        }
        ctx.drawImage(layer.canvas, 0, 0);

        addVignette(ctx, width, height, palette.ink, 0.26 + (currentState.advanced.vignette ?? 0.56) * 0.38);
      }

      function drawOrganicGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const flowCount = 2 + Math.round(currentState.advanced.shapeCount * 2 + currentState.density * 1.5);
        const blur = width * (0.05 + currentState.advanced.softness * 0.08);
        for (let index = 0; index < flowCount; index += 1) {
          const points = [];
          const baseY = height * (0.18 + (index / Math.max(1, flowCount - 1)) * 0.6);
          for (let step = 0; step <= 8; step += 1) {
            const t = step / 8;
            points.push({
              x: width * t,
              y: baseY
                + Math.sin(t * Math.PI * (1.2 + currentState.advanced.drift * 2.6) + index * 0.7) * height * (0.06 + currentState.advanced.stretch * 0.08)
                + (rng() - 0.5) * height * 0.06,
            });
          }
          paintSoftRibbon(layer.ctx, points, {
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accent, 0.56),
            lineWidth: width * (0.09 + currentState.complexity * 0.06),
            blur: blur * (0.85 + currentState.advanced.glowRadius * 0.3),
          });
        }
        paintSoftEllipse(layer.ctx, {
          x: width * 0.28,
          y: height * 0.64,
          rx: width * 0.2,
          ry: height * 0.14,
          rotation: 0.42,
          color: hexToRgba(palette.accentSoft, 0.8),
          blur: blur * 0.9,
        });
        ctx.drawImage(layer.canvas, 0, 0);

        paintSoftEllipse(ctx, {
          x: width * 0.58,
          y: height * 0.48,
          rx: width * 0.24,
          ry: height * 0.18,
          rotation: -0.18,
          color: hexToRgba(palette.accentSoft, 0.12 + currentState.advanced.veil * 0.16),
          blur: blur * 0.6,
        });

      function buildReededFieldComposition(width, height, currentState, rng) {
        const focusStrength = currentState.advanced.focusField ?? 0.5;
        const focusZones = [
          {
            x: width * 0.38,
            width: width * (0.2 + focusStrength * 0.16),
            intensity: 0.22 + focusStrength * 0.32,
            drift: 0,
            bias: 0,
          },
          {
            x: width * 0.66,
            width: width * (0.18 + focusStrength * 0.14),
            intensity: 0.16 + focusStrength * 0.24,
            drift: 0,
            bias: Math.PI,
          },
        ];

        return {
          basePhase: 0,
          refractionPhase: Math.PI * 0.5,
          focusZones,
        };
      }

      function getReededRidgeStep(width, ridgeDensity) {
        const targetStep = width * (0.048 + (1 - ridgeDensity) * 0.078);
        const ridgeCount = Math.max(10, Math.round(width / Math.max(1, targetStep)));
        return width / ridgeCount;
      }

      function drawReededRefractionScene(ctx, width, height, palette, currentState) {
        const layer = createLayer(width, height);

        const planeBlur = width * (0.025 + blend * 0.026 + softness * 0.012);

          { x: 0.34, y: 0.22, w: 0.42, h: 0.22, r: 0.12, rotation: 0.18, color: palette.surface, alpha: 0.11 + blend * 0.04, composite: "screen" },
          { x: 0.18, y: 0.52, w: 0.52, h: 0.26, r: 0.14, rotation: 0.26, color: palette.accentSoft, alpha: 0.09 + refraction * 0.045, composite: "screen" },
          { x: 0.5, y: 0.5, w: 0.42, h: 0.24, r: 0.12, rotation: -0.2, color: palette.ink, alpha: 0.055 + depth * 0.03, composite: "multiply" },

        planes.forEach((plane, index) => {

        const seamSets = [

              { x: width * -0.1, y: height * 0.72 },

              { x: width * 0.54, y: height * 0.76 },
              { x: width * 1.08, y: height * 0.58 },
            ],
            color: palette.ink,
            alpha: 0.036 + depth * 0.024,
            width: 0.05,
            blur: 0.02,
            composite: "multiply",
          },
        ];

        seamSets.forEach((seam) => {
          paintSoftRibbon(layer.ctx, seam.points, {
            color: hexToRgba(seam.color, seam.alpha),
            lineWidth: width * (seam.width + refraction * 0.018),
            blur: width * (seam.blur + softness * 0.01),
            composite: seam.composite,
          });
        });

        for (let index = 0; index < 4; index += 1) {
          const progress = index / 3;
          paintSoftEllipse(layer.ctx, {
            x: width * (0.16 + progress * 0.64 + (sceneRng() - 0.5) * 0.035),
            y: height * (0.22 + (index % 2) * 0.46 + (sceneRng() - 0.5) * 0.06),
            rx: width * (0.085 + refraction * 0.07),
            ry: height * (0.075 + blend * 0.045),
            rotation: -0.36 + progress * 0.72,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.ink, index % 2 === 0 ? 0.045 + blend * 0.018 : 0.026 + depth * 0.014),
            blur: width * (0.018 + softness * 0.018),

          });

        const veil = layer.ctx.createLinearGradient(0, 0, width, height);
        veil.addColorStop(0, hexToRgba(palette.accentSoft, 0.018 + blend * 0.02));

        veil.addColorStop(1, hexToRgba(palette.ink, 0.018 + depth * 0.016));
        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "source-over";

      const reededMaterialAsset = {
        image: null,
        ready: false,
        loading: false,

      function buildReededMaterialSvg() {
        return `
          <svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
            <defs>
              <filter id="soften" x="-4%" y="-1%" width="108%" height="102%">

              </filter>
              <linearGradient id="verticalVeil" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#ffffff" stop-opacity="0.1"/>
                <stop offset="0.18" stop-color="#ffffff" stop-opacity="0.03"/>
                <stop offset="0.48" stop-color="#ffffff" stop-opacity="0"/>
                <stop offset="0.82" stop-color="#0b1020" stop-opacity="0.07"/>
