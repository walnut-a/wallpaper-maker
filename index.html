            <rect width="1080" height="1920" fill="url(#wideSpecular)" opacity="0.48"/>
          </svg>
        `;
      }

      function ensureReededMaterialAsset() {
        if (reededMaterialAsset.ready || reededMaterialAsset.loading) {
          return reededMaterialAsset;
        }
        reededMaterialAsset.loading = true;
        const image = new Image();
        image.decoding = "async";
        image.onload = () => {
          reededMaterialAsset.ready = true;
          reededMaterialAsset.loading = false;
          queueRender();
          if (state.shapeMode === "reeded-column") {
            refreshCandidates({ silent: true });
          }
        };
        image.onerror = () => {
          reededMaterialAsset.loading = false;
        };
        image.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(buildReededMaterialSvg())}`;
        reededMaterialAsset.image = image;
        return reededMaterialAsset;
      }

      function drawReededColumnDisplacement(ctx, sourceCanvas, width, height, palette, currentState, composition) {
        const ridgeDensity = currentState.advanced.ridgeDensity ?? 0.38;
        const ridgeBreath = currentState.advanced.ridgeBreath ?? 0.6;
        const refractionField = currentState.advanced.refractionField ?? 0.4;
        const glassDepth = currentState.advanced.glassDepth ?? 0.52;
        const step = getReededRidgeStep(width, ridgeDensity);
        const samplesPerRidge = 10;
        const baseShift = width * (0.0014 + refractionField * 0.006 + glassDepth * 0.0022);

        ctx.save();
        ctx.imageSmoothingEnabled = true;
        ctx.drawImage(sourceCanvas, 0, 0, width, height);
        for (let x = 0; x < width; x += step) {
          const localWidth = Math.min(step, width - x);
          const sliceWidth = localWidth / samplesPerRidge;
          let focusShift = 0;
          composition.focusZones.forEach((zone) => {
            const influence = gaussianInfluence(x, zone.x, zone.width * 0.7);
            focusShift += influence * zone.drift * 0.2;
          });

          for (let sample = 0; sample < samplesPerRidge; sample += 1) {
            const t = (sample + 0.5) / samplesPerRidge;
            const localX = x + sample * sliceWidth;
            const ridgeNormal = Math.sin((t - 0.5) * Math.PI);
            const ridgeLens = Math.cos((t - 0.5) * Math.PI);
            const faceSoftness = 0.98 - ridgeLens * (0.09 + ridgeBreath * 0.075);
            const sourceShift = ridgeNormal * baseShift * faceSoftness + focusShift;
            const sx = clamp(localX + sourceShift, 0, Math.max(0, width - sliceWidth));
            ctx.drawImage(sourceCanvas, sx, 0, sliceWidth, height, localX, 0, sliceWidth, height);
          }
        }
        ctx.restore();

        const ridgeOverlay = createLayer(width, height);
        ridgeOverlay.ctx.save();
        ridgeOverlay.ctx.globalCompositeOperation = "soft-light";
        ridgeOverlay.ctx.globalAlpha = 0.2;
        for (let x = 0; x < width; x += step) {
          const localWidth = Math.min(step, width - x);
          const gradient = ridgeOverlay.ctx.createLinearGradient(x, 0, x + localWidth, 0);
          gradient.addColorStop(0, hexToRgba(palette.ink, 0.016 + glassDepth * 0.013));
          gradient.addColorStop(0.24, `rgba(255,255,255,${0.02 + glassDepth * 0.016})`);
          gradient.addColorStop(0.48, `rgba(255,255,255,${0.04 + glassDepth * 0.032})`);
          gradient.addColorStop(0.66, hexToRgba(palette.surface, 0.01 + refractionField * 0.014));
          gradient.addColorStop(0.84, `rgba(255,255,255,${0.022 + glassDepth * 0.018})`);
          gradient.addColorStop(1, hexToRgba(palette.ink, 0.014 + glassDepth * 0.013));
          ridgeOverlay.ctx.fillStyle = gradient;
          ridgeOverlay.ctx.fillRect(x, 0, localWidth, height);
        }
        ridgeOverlay.ctx.restore();
        ctx.drawImage(ridgeOverlay.canvas, 0, 0);
      }

      function drawReededSvgMaterial(ctx, width, height, palette, currentState, composition) {
        const asset = ensureReededMaterialAsset();
        const depth = currentState.advanced.glassDepth ?? 0.52;
        const refractionField = currentState.advanced.refractionField ?? 0.4;
        const focusStrength = currentState.advanced.focusField ?? 0.5;

        if (asset.ready && asset.image) {
          ctx.save();
          ctx.globalCompositeOperation = "soft-light";
          ctx.globalAlpha = 0.18 + depth * 0.08;
          ctx.drawImage(asset.image, 0, 0, width, height);
          ctx.restore();

          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = 0.055 + depth * 0.038;
          ctx.drawImage(asset.image, 0, 0, width, height);
          ctx.restore();
        }

        composition.focusZones.forEach((zone, index) => {
          paintSoftRoundedRect(ctx, {
            x: zone.x - zone.width * 0.44 + zone.drift * 0.16,
            y: height * (0.025 + index * 0.04),
            width: zone.width * (0.5 + focusStrength * 0.22),
            height: height * 0.93,
            radius: zone.width * 0.32,
            color: `rgba(255, 255, 255, ${0.022 + zone.intensity * 0.04 + depth * 0.018})`,
            blur: width * (0.048 + depth * 0.04),
            composite: "screen",
          });
        });

        paintSoftEllipse(ctx, {
          x: width * 0.52,
          y: height * 0.45,
          rx: width * (0.3 + refractionField * 0.12),
          ry: height * (0.36 + depth * 0.08),
          color: hexToRgba(palette.surface, 0.014 + refractionField * 0.02),
          blur: width * 0.112,
          composite: "screen",
        });
        addVignette(ctx, width, height, palette.ink, 0.055 + refractionField * 0.055);
      }

      function drawReededFieldBase(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);

        const step = getReededRidgeStep(width, ridgeDensity);

        layer.ctx.globalCompositeOperation = "soft-light";
        for (let x = 0; x < width; x += step) {
          const localWidth = Math.min(step, width - x);
          let localIntensity = 0.018 + ridgeDensity * 0.02;
          composition.focusZones.forEach((zone) => {

          const gradient = layer.ctx.createLinearGradient(x, 0, x + localWidth, 0);

          gradient.addColorStop(0.24, hexToRgba(palette.surface, 0.024 + localIntensity * 0.22));
          gradient.addColorStop(0.5, `rgba(255, 255, 255, ${0.02 + localIntensity * 0.3})`);

          gradient.addColorStop(1, hexToRgba(palette.ink, 0.03 + localIntensity * 0.24));

        composition.focusZones.forEach((zone, index) => {

            rx: zone.width * (0.58 + fieldBlend * 0.36),
            ry: height * (0.22 + fieldBlend * 0.08),
            rotation: zone.drift / Math.max(width, 1),
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.05 + fieldBlend * 0.048),

      function drawReededFieldRefraction(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);
        const refractionField = currentState.advanced.refractionField ?? 0.4;
        const fieldBlend = currentState.advanced.fieldBlend ?? 0.66;
        const ridgeDensity = currentState.advanced.ridgeDensity ?? 0.38;
        const step = getReededRidgeStep(width, ridgeDensity);

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "screen";
        for (let x = 0; x < width; x += step) {
          let intensity = 0.008 + refractionField * 0.02;
          composition.focusZones.forEach((zone) => {
            const influence = gaussianInfluence(x, zone.x, zone.width * 0.86);
            intensity += influence * zone.intensity * 0.028;
          });
          const bandWidth = Math.min(step * 0.94, width - x);
          const bandGradient = layer.ctx.createLinearGradient(x, 0, x + bandWidth, 0);
          bandGradient.addColorStop(0, hexToRgba(palette.accent, 0));
          bandGradient.addColorStop(0.28, hexToRgba(palette.surface, 0.016 + intensity));
          bandGradient.addColorStop(0.56, `rgba(255, 255, 255, ${0.008 + intensity * (0.44 + fieldBlend * 0.16)})`);
          bandGradient.addColorStop(0.84, hexToRgba(palette.accentSoft, 0.01 + intensity * 0.34));
          bandGradient.addColorStop(1, hexToRgba(palette.accent, 0));
          layer.ctx.fillStyle = bandGradient;
          layer.ctx.fillRect(x, 0, bandWidth, height);
        }
        layer.ctx.restore();

        composition.focusZones.forEach((zone) => {
          paintSoftEllipse(layer.ctx, {
            x: zone.x + zone.drift,
            y: height * 0.54,
            rx: zone.width * (0.62 + refractionField * 0.24),
            ry: height * (0.36 + fieldBlend * 0.12),
            rotation: zone.drift / Math.max(width, 1),
            color: hexToRgba(palette.accent, 0.028 + zone.intensity * 0.045),
            blur: width * (0.082 + refractionField * 0.045),
            composite: "screen",
          });
        });

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawReededFieldFocus(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);
        const focusStrength = currentState.advanced.focusField ?? 0.5;
        const fieldBlend = currentState.advanced.fieldBlend ?? 0.66;

        composition.focusZones.forEach((zone, index) => {
          const coreWidth = zone.width * (0.52 + focusStrength * 0.34);
          paintSoftRoundedRect(layer.ctx, {
            x: zone.x - coreWidth * 0.5,
            y: height * (0.04 + index * 0.04),
            width: coreWidth,
            height: height * 0.92,
            radius: coreWidth * 0.44,
            color: `rgba(255, 255, 255, ${0.013 + zone.intensity * 0.045})`,
            blur: width * (0.062 + fieldBlend * 0.052),
            composite: "screen",
          });
          paintSoftEllipse(layer.ctx, {
            x: zone.x - zone.drift * 0.16,
            y: height * 0.48,
            rx: coreWidth * (0.52 + fieldBlend * 0.2),
            ry: height * 0.28,
            rotation: 0,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.024 + focusStrength * 0.032),
            blur: width * (0.066 + focusStrength * 0.035),
            composite: "screen",
          });
        });

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawReededGlassMaterialOverlay(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);
        const ridgeDensity = currentState.advanced.ridgeDensity ?? 0.38;
        const refractionField = currentState.advanced.refractionField ?? 0.4;
        const focusStrength = currentState.advanced.focusField ?? 0.5;
        const glassDepth = currentState.advanced.glassDepth ?? 0.52;
        const step = getReededRidgeStep(width, ridgeDensity);

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "screen";
        for (let x = 0; x < width; x += step) {
          const localWidth = Math.min(step, width - x);
          const gradient = layer.ctx.createLinearGradient(x, 0, x + localWidth, 0);
          gradient.addColorStop(0, hexToRgba(palette.ink, 0));
          gradient.addColorStop(0.12, hexToRgba(palette.accentSoft, 0.004 + glassDepth * 0.007));
          gradient.addColorStop(0.3, `rgba(255, 255, 255, ${0.007 + glassDepth * 0.014})`);
          gradient.addColorStop(0.5, hexToRgba(palette.surface, 0.006 + refractionField * 0.011));
          gradient.addColorStop(0.74, `rgba(255, 255, 255, ${0.003 + glassDepth * 0.009})`);
          gradient.addColorStop(1, hexToRgba(palette.ink, 0));
          layer.ctx.fillStyle = gradient;
          layer.ctx.fillRect(x, 0, localWidth, height);
        }
        layer.ctx.restore();

        layer.ctx.save();
        layer.ctx.globalCompositeOperation = "multiply";
        for (let x = 0; x < width; x += step) {
          const localWidth = Math.min(step, width - x);
          const shadow = layer.ctx.createLinearGradient(x, 0, x + localWidth, 0);
          shadow.addColorStop(0, hexToRgba(palette.ink, 0.005 + glassDepth * 0.008));
          shadow.addColorStop(0.2, hexToRgba(palette.ink, 0));
          shadow.addColorStop(0.8, hexToRgba(palette.ink, 0));
          shadow.addColorStop(1, hexToRgba(palette.ink, 0.004 + glassDepth * 0.007));
          layer.ctx.fillStyle = shadow;
          layer.ctx.fillRect(x, 0, localWidth, height);
        }
        layer.ctx.restore();

        composition.focusZones.forEach((zone, index) => {
          const strength = 0.019 + zone.intensity * 0.034 + glassDepth * 0.019;
          paintSoftRoundedRect(layer.ctx, {
            x: zone.x - zone.width * 0.42 + zone.drift * 0.28,
            y: height * (0.02 + index * 0.045),
            width: zone.width * (0.48 + focusStrength * 0.2),
            height: height * 0.94,
            radius: zone.width * 0.28,
            color: `rgba(255, 255, 255, ${strength})`,
            blur: width * (0.048 + glassDepth * 0.042),
            composite: "screen",
          });
        });

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawReededGlassGeometry(ctx, width, height, palette, currentState, rng) {
        const composition = buildReededFieldComposition(width, height, currentState, rng);
        drawReededGlassField2D(ctx, width, height, palette, currentState, composition);
        drawReededGlassMaterialOverlay(ctx, width, height, palette, currentState, composition);
      }

      function drawReededGlassField2D(ctx, width, height, palette, currentState, composition) {
        drawReededFieldBase(ctx, width, height, palette, currentState, composition);
        drawReededFieldRefraction(ctx, width, height, palette, currentState, composition);
        drawReededFieldFocus(ctx, width, height, palette, currentState, composition);
        addVignette(ctx, width, height, palette.ink, 0.06 + (currentState.advanced.refractionField ?? 0.4) * 0.058);
      }

      function drawArchedPillarGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const archCount = 2 + Math.round(currentState.advanced.shapeCount * 3 + currentState.density * 1.5);
        const archWidth = currentState.advanced.archWidth ?? 0.46;
        const archRise = currentState.advanced.archRise ?? 0.58;
        const blur = width * (0.022 + currentState.advanced.softness * 0.075 + currentState.advanced.glowRadius * 0.028);

        paintSoftArch(layer.ctx, {
          x: width * 0.42,
          y: height * 0.14,
          width: width * (0.18 + archWidth * 0.16),
          height: height * 0.68,
          archRise,
          color: hexToRgba(palette.ink, 0.48),
          blur: blur * 0.58,
        });

        paintSoftArch(layer.ctx, {
          x: width * 0.22,
          y: height * 0.22,
          width: width * (0.16 + archWidth * 0.14),
          height: height * 0.52,
          archRise: archRise * 0.92,
          color: hexToRgba(palette.surface, 0.76),
          blur: blur * 0.78,
        });

        paintSoftEllipse(layer.ctx, {
          x: width * 0.68,
          y: height * 0.28,
          rx: width * 0.2,
          ry: height * 0.18,
          rotation: -0.18,
          color: hexToRgba(palette.accent, 0.22 + currentState.advanced.glowRadius * 0.12),
          blur: blur * 1.1,
        });

        for (let index = 0; index < archCount; index += 1) {
          const progress = archCount === 1 ? 0.5 : index / (archCount - 1);
          const localWidth = width * (0.1 + archWidth * (0.08 + rng() * 0.08));
          const localHeight = height * (0.26 + rng() * 0.38);
          paintSoftArch(layer.ctx, {
            x: width * (0.08 + progress * 0.7) + (rng() - 0.5) * width * 0.06,
            y: height * (0.18 + rng() * 0.44),
            width: localWidth,
            height: localHeight,
            archRise: archRise * (0.82 + rng() * 0.24),
            rotation: (rng() - 0.5) * 0.12,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.18 + currentState.advanced.tonalSplit * 0.14),
            blur: blur * (0.5 + rng() * 0.42),
          });
        }

        ctx.drawImage(layer.canvas, 0, 0);
        addVignette(ctx, width, height, palette.ink, 0.1 + currentState.advanced.tonalSplit * 0.1);
      }

      function buildMirrorPlanePoints(centerX, centerY, planeWidth, planeHeight, rotation, taper, skew) {
        const halfWidth = planeWidth * 0.5;
        const halfHeight = planeHeight * 0.5;
        return transformPoints([
          { x: -halfWidth + taper * 0.22, y: -halfHeight },
          { x: halfWidth, y: -halfHeight + skew },
          { x: halfWidth - taper * 0.14, y: halfHeight },
          { x: -halfWidth, y: halfHeight - skew * 0.68 },
        ], centerX, centerY, rotation);
      }

      function buildMirrorFieldComposition(width, height, palette, currentState, rng) {
        const count = 3 + Math.round((currentState.advanced.sliceCount ?? 0.34) * 2);
        const direction = -0.86 + (currentState.advanced.sliceDirection ?? 0.56) * 1.42;
        const variance = currentState.advanced.sliceVariance ?? 0.52;
        const melt = currentState.advanced.sliceMelt ?? 0.48;
        const reveal = currentState.advanced.sliceReveal ?? 0.58;
        const masses = [];

        for (let index = 0; index < count; index += 1) {
          const progress = count === 1 ? 0.5 : index / (count - 1);
          const widthBias = 0.78 + Math.sin(progress * Math.PI * 1.35 + 0.24) * variance * 0.84 + (rng() - 0.5) * 0.22;
          const massWidth = width * (0.16 + variance * 0.18 + Math.max(0.03, widthBias * 0.1));
          const massHeight = height * (0.72 + rng() * 0.18);
          const taper = massWidth * (0.12 + variance * 0.42 + rng() * 0.14);
          const skew = massWidth * (0.04 + variance * 0.16 + rng() * 0.08);
          const centerX = width * (0.02 + progress * 0.96) + (progress - 0.5) * width * variance * 0.1;
          const centerY = height * 0.56 + (progress - 0.5) * height * 0.04 + (rng() - 0.5) * height * 0.05;
          const points = buildMirrorPlanePoints(centerX, centerY, massWidth, massHeight, direction + (rng() - 0.5) * 0.12, taper, skew);
          masses.push({
            points,
            leftMid: linePoint(points[0], points[3], 0.5),
            rightMid: linePoint(points[1], points[2], 0.5),
            topMid: linePoint(points[0], points[1], 0.5),
            bottomMid: linePoint(points[3], points[2], 0.5),
            fill: index % 3 === 0 ? palette.surface : index % 2 === 0 ? palette.accentSoft : palette.accent,
            melt: melt * (0.72 + rng() * 0.38),
            reveal: reveal * (0.72 + rng() * 0.34),
            openStart: 0.08 + melt * (0.18 + rng() * 0.16),
            openEnd: 0.72 + reveal * (0.12 + rng() * 0.12),
            zIndex: index + progress * 0.4,
          });
        }

        masses.sort((massA, massB) => massA.zIndex - massB.zIndex);
        return {
          fieldAngle: direction,
          masses,
          fogBands: [
            {
              points: [
                { x: width * -0.12, y: height * 0.18 },
                { x: width * 0.28, y: height * 0.12 },
                { x: width * 0.96, y: height * 0.58 },
                { x: width * 0.54, y: height * 0.64 },
              ],
              color: palette.accentSoft,
            },
            {
              points: [
                { x: width * -0.08, y: height * 0.72 },
                { x: width * 0.42, y: height * 0.62 },
                { x: width * 1.08, y: height * 0.94 },
                { x: width * 0.62, y: height * 1.02 },
              ],
              color: palette.surface,
            },
          ],
        };
      }

      function drawMirrorSliceMass(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);
        const melt = currentState.advanced.sliceMelt ?? 0.48;
        const reveal = currentState.advanced.sliceReveal ?? 0.58;

        composition.fogBands.forEach((band, index) => {
          layer.ctx.save();
          tracePolygon(layer.ctx, band.points);
          layer.ctx.fillStyle = hexToRgba(band.color, 0.04 + reveal * 0.05);
          layer.ctx.filter = `blur(${width * (0.045 + melt * 0.02)}px)`;
          layer.ctx.fill();
          layer.ctx.restore();
        });

        composition.masses.forEach((mass) => {
          layer.ctx.save();
          tracePolygon(layer.ctx, mass.points);
          const faceGradient = layer.ctx.createLinearGradient(mass.leftMid.x, mass.leftMid.y, mass.rightMid.x, mass.rightMid.y);
          faceGradient.addColorStop(0, hexToRgba(palette.ink, 0.12 + currentState.advanced.tonalSplit * 0.08));
          faceGradient.addColorStop(0.22, hexToRgba(mass.fill, 0.16 + mass.reveal * 0.08));
          faceGradient.addColorStop(0.52, `rgba(255, 255, 255, ${0.06 + mass.reveal * 0.08})`);
          faceGradient.addColorStop(0.84, hexToRgba(mass.fill, 0.14 + mass.reveal * 0.06));
          faceGradient.addColorStop(1, hexToRgba(palette.ink, 0.16 + currentState.advanced.tonalSplit * 0.08));
          layer.ctx.fillStyle = faceGradient;
          layer.ctx.filter = `blur(${width * (0.012 + mass.melt * 0.028)}px)`;
          layer.ctx.fill();
          layer.ctx.restore();

          paintSoftEllipse(layer.ctx, {
            x: mass.topMid.x,
            y: mass.topMid.y + height * 0.08,
            rx: width * (0.08 + mass.melt * 0.08),
            ry: height * (0.12 + mass.melt * 0.08),
            rotation: composition.fieldAngle,
            color: hexToRgba(mass.fill, 0.05 + mass.reveal * 0.05),
            blur: width * (0.03 + mass.melt * 0.03),
            composite: "screen",
          });
        });

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawMirrorSliceEdges(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);

        composition.masses.forEach((mass, index) => {
          const leftStart = linePoint(mass.points[0], mass.points[3], mass.openStart);
          const leftEnd = linePoint(mass.points[0], mass.points[3], Math.min(0.98, mass.openEnd));
          const rightStart = linePoint(mass.points[1], mass.points[2], mass.openStart * 0.92);
          const rightEnd = linePoint(mass.points[1], mass.points[2], Math.min(0.98, mass.openEnd - mass.melt * 0.18));
          layer.ctx.save();
          layer.ctx.lineCap = "round";
          layer.ctx.lineJoin = "round";
          layer.ctx.lineWidth = 1.5 + mass.reveal * 2.6;

          layer.ctx.strokeStyle = `rgba(255, 255, 255, ${0.06 + mass.reveal * 0.14})`;
          layer.ctx.beginPath();
          layer.ctx.moveTo(leftStart.x, leftStart.y);
          layer.ctx.lineTo(leftEnd.x, leftEnd.y);
          layer.ctx.stroke();

          if (index % 2 === 0 || mass.reveal > 0.55) {
            layer.ctx.strokeStyle = hexToRgba(palette.ink, 0.06 + currentState.advanced.tonalSplit * 0.08);
            layer.ctx.beginPath();
            layer.ctx.moveTo(rightStart.x, rightStart.y);
            layer.ctx.lineTo(rightEnd.x, rightEnd.y);
            layer.ctx.stroke();
          }

          layer.ctx.restore();
        });

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawMirrorSliceMelt(ctx, width, height, palette, currentState, composition) {
        const layer = createLayer(width, height);

        composition.masses.forEach((mass, index) => {
          const meltColor = index % 2 === 0 ? palette.backgroundA : palette.backgroundB;
          paintSoftEllipse(layer.ctx, {
            x: mass.leftMid.x - width * 0.03,
            y: mass.leftMid.y,
            rx: width * (0.1 + mass.melt * 0.1),
            ry: height * (0.18 + mass.melt * 0.12),
            rotation: composition.fieldAngle,
            color: hexToRgba(meltColor, 0.12 + mass.melt * 0.08),
            blur: width * (0.05 + mass.melt * 0.05),
            composite: "source-over",
          });
          paintSoftEllipse(layer.ctx, {
            x: mass.rightMid.x + width * 0.04,
            y: mass.rightMid.y,
            rx: width * (0.08 + mass.melt * 0.08),
            ry: height * (0.2 + mass.melt * 0.1),
            rotation: composition.fieldAngle,
            color: hexToRgba(meltColor, 0.08 + mass.melt * 0.08),
            blur: width * (0.045 + mass.melt * 0.04),
            composite: "source-over",
          });
        });

        ctx.drawImage(layer.canvas, 0, 0);
      }

      function drawMirrorSliceGeometry(ctx, width, height, palette, currentState, rng) {
        const composition = buildMirrorFieldComposition(width, height, palette, currentState, rng);
        drawMirrorSliceMass(ctx, width, height, palette, currentState, composition);
        drawMirrorSliceEdges(ctx, width, height, palette, currentState, composition);
        drawMirrorSliceMelt(ctx, width, height, palette, currentState, composition);
        addVignette(ctx, width, height, palette.ink, 0.1 + currentState.advanced.tonalSplit * 0.1);
      }

      function drawAccentLayer(ctx, width, height, palette, currentState, rng) {
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        if (currentState.shapeMode === "minimal-form" && currentState.backgroundMode !== "deep-cold" && currentState.textureMode !== "satin-flow") {
          paintSoftEllipse(ctx, {
            x: width * (0.28 + (currentState.advanced.lightDrift ?? 0.5) * 0.22),
            y: height * 0.18,
            rx: width * 0.16,
            ry: height * 0.08,
            color: hexToRgba(palette.accent, 0.24),
            blur: width * 0.04,
          });
        }
        if (currentState.shapeMode === "soft-blocks") {
          paintSoftRoundedRect(ctx, {
            x: width * 0.54,
            y: height * 0.16,
            width: width * 0.24,
            height: height * 0.18,
            radius: width * 0.08,
            rotation: 0.22,
            color: hexToRgba(palette.ink, 0.24 + currentState.advanced.tonalSplit * 0.1),
            blur: width * 0.025,
          });
        }
        if (currentState.backgroundMode === "deep-cold" || currentState.textureMode === "satin-flow") {
          const glow = currentState.advanced.glowRadius ?? 0.5;
          paintSoftEllipse(ctx, {
            x: width * 0.46,
            y: height * 0.56,
            rx: width * (0.24 + glow * 0.12),
            ry: height * (0.1 + glow * 0.06),
            rotation: -0.18,
            color: hexToRgba(palette.accent, 0.08 + glow * 0.06),
            blur: width * 0.075,
            composite: "screen",
          });
          paintSoftEllipse(ctx, {
            x: width * 0.54,
            y: height * 0.52,
            rx: width * 0.16,
            ry: height * 0.2,
            rotation: -0.28,
            color: hexToRgba(palette.ink, 0.18),
            blur: width * 0.055,
          });
        }
        if (currentState.shapeMode === "flow-ribbons") {
          ctx.fillStyle = hexToRgba(palette.accentSoft, 0.1 + currentState.advanced.veil * 0.18);
          for (let i = 0; i < 3; i += 1) {
            const x = width * (0.12 + rng() * 0.6);
            const y = height * (0.14 + rng() * 0.62);
            const w = width * (0.16 + rng() * 0.24);
            const h = height * (0.12 + rng() * 0.22);
            ctx.beginPath();
            ctx.ellipse(x, y, w, h, rng() * Math.PI, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        if (currentState.shapeMode === "fluid-blobs") {
          paintSoftBlob(ctx, {
            x: width * 0.34,
            y: height * 0.24,
            rx: width * 0.14,
            ry: height * 0.1,
            rotation: -0.16,
            roughness: 0.16 + (currentState.advanced.blobFlow ?? 0.58) * 0.36,
            phaseA: rng() * Math.PI * 2,
            phaseB: rng() * Math.PI * 2,
            phaseC: rng() * Math.PI * 2,
            color: hexToRgba(palette.accentSoft, 0.08 + currentState.advanced.glowRadius * 0.1),
            blur: width * 0.04,
            composite: "screen",
          });
        }
        if (currentState.shapeMode === "reeded-column") {
          paintSoftEllipse(ctx, {
            x: width * 0.48,
            y: height * 0.44,
            rx: width * (0.22 + (currentState.advanced.focusField ?? 0.5) * 0.1),
            ry: height * 0.28,
            rotation: 0,
            color: hexToRgba(palette.surface, 0.024 + (currentState.advanced.fieldBlend ?? 0.66) * 0.04),
            blur: width * 0.064,
            composite: "screen",
          });
        }
        if (currentState.shapeMode === "arched-pillars") {
          paintSoftArch(ctx, {
            x: width * 0.18,
            y: height * 0.16,
            width: width * 0.22,
            height: height * 0.5,
            archRise: (currentState.advanced.archRise ?? 0.58) * 0.96,
            color: `rgba(255, 255, 255, ${0.07 + currentState.advanced.glowRadius * 0.08})`,
            blur: width * 0.022,
            composite: "screen",
          });
        }
        if (currentState.shapeMode === "mirror-slices") {
          paintSoftEllipse(ctx, {
            x: width * 0.58,
            y: height * 0.22,
            rx: width * 0.24,
            ry: height * 0.1,
            rotation: -0.18 + (currentState.advanced.sliceDirection ?? 0.56) * 0.28,
            color: hexToRgba(palette.surface, 0.04 + (currentState.advanced.sliceReveal ?? 0.58) * 0.05),
            blur: width * (0.04 + (currentState.advanced.sliceMelt ?? 0.48) * 0.02),
            composite: "screen",
          });
        }
        if (currentState.shapeMode === "orbital-tether") {
          const warpAngle = getWarpAngleRadians(currentState);
          paintSoftEllipse(ctx, {
            x: width * 0.62,
            y: height * 0.74,
            rx: width * 0.32,
            ry: height * 0.1,
            rotation: warpAngle * 0.55,
            color: hexToRgba(palette.accent, 0.04 + (currentState.advanced.glowRadius ?? 0.55) * 0.045),
            blur: width * 0.07,
            composite: "screen",
          });
          paintSoftEllipse(ctx, {
            x: width * (0.36 + (currentState.advanced.driftOffset ?? 0.46) * 0.2),
            y: height * (0.24 + (1 - (currentState.advanced.driftOffset ?? 0.46)) * 0.1),
            rx: width * 0.16,
            ry: height * 0.06,
            rotation: warpAngle * 0.4,
            color: hexToRgba(palette.accentSoft, 0.04 + (currentState.advanced.tetherTension ?? 0.72) * 0.035),
            blur: width * 0.04,
            composite: "screen",
          });
        }
        ctx.restore();
      }

      function drawTextureLayer(ctx, width, height, palette, currentState, rng) {
        const fineGrain = currentState.advanced.grainFine ?? 0.14;
        const noiseIntensity = currentState.textureMode === "satin-flow"
          ? 0.045 + fineGrain * 0.2
          : currentState.textureMode === "light-grid"
            ? 0.05 + fineGrain * 0.35
            : currentState.textureMode === "prism-glass"
              ? 0.06 + fineGrain * 0.3 + currentState.complexity * 0.03
            : 0.05 + currentState.complexity * 0.05 + currentState.density * 0.03;

        if (noiseIntensity > 0.01) {
          const dots = Math.round(width * height * (0.00018 + noiseIntensity * 0.0007));
          ctx.fillStyle = hexToRgba(palette.ink, 0.05 + noiseIntensity * 0.05);
          for (let i = 0; i < dots; i += 1) {
            const x = rng() * width;
            const y = rng() * height;
            const size = 0.2 + rng() * (0.8 + noiseIntensity);
            ctx.fillRect(x, y, size, size);
          }
        }

        if (currentState.textureMode === "light-grid") {
          const patternAlpha = 0.008 + (currentState.advanced.patternStrength ?? 0.26) * 0.045;
          const spacing = width * (0.06 + (1 - currentState.density) * 0.06);
          drawGridPattern(ctx, width, height, spacing, palette.ink, patternAlpha);
        }

        if (currentState.textureMode === "satin-flow") {
          drawSatinFlowTexture(ctx, width, height, palette, currentState, rng);
        }

        if (currentState.textureMode === "prism-glass") {
          const ridgeDensity = currentState.advanced.ridgeDensity ?? 0.48;
          drawPrismTexture(ctx, width, height, palette, ridgeDensity, currentState.advanced.prismStrength, rng);
        }

        if (currentState.textureMode === "stardust-sparks") {
          const sparkDensity = currentState.advanced.sparkDensity ?? 0.42;
          const sparkSharpness = currentState.advanced.sparkSharpness ?? 0.68;
          const warpAngle = getWarpAngleRadians(currentState);
          const pointCount = Math.round(width * height * (0.000012 + sparkDensity * 0.000045));

          ctx.save();
          ctx.globalCompositeOperation = "screen";
          for (let index = 0; index < pointCount; index += 1) {
            const x = rng() * width;
            const y = rng() * height;
            const alpha = 0.05 + rng() * 0.2;
            const size = 0.35 + rng() * (0.55 + sparkSharpness * 0.6);
            ctx.fillStyle = index % 7 === 0
              ? hexToRgba(palette.accentSoft, alpha * 0.6)
              : index % 5 === 0
                ? hexToRgba(palette.accent, alpha * 0.44)
                : `rgba(255,255,255,${alpha * 0.72})`;
            ctx.fillRect(x, y, size, size);

            if (rng() < 0.1 + sparkDensity * 0.16) {
              const length = width * (0.003 + sparkSharpness * 0.01) * (0.35 + rng());
              ctx.save();
              ctx.translate(x, y);
              ctx.rotate(warpAngle + (rng() - 0.5) * 0.18);
              ctx.strokeStyle = index % 6 === 0
                ? hexToRgba(palette.accentSoft, alpha * 0.3)
                : `rgba(255,255,255,${alpha * 0.36})`;
              ctx.lineWidth = 0.45 + sparkSharpness * 0.45;
              ctx.beginPath();
              ctx.moveTo(-length * 0.5, 0);
              ctx.lineTo(length * 0.5, 0);
              ctx.stroke();
              ctx.restore();
            }
          }
          ctx.restore();
        }
      }

      function roundedRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function drawBackgroundMode(ctx, width, height, palette, currentState, rng) {
        drawBackground(ctx, width, height, palette, currentState, rng);
      }

      function drawShapeMode(ctx, width, height, palette, currentState, rng) {
        switch (currentState.shapeMode) {
          case "minimal-form":
            if (currentState.backgroundMode === "deep-cold" || currentState.textureMode === "satin-flow") {
              drawTechGeometry(ctx, width, height, palette, currentState, rng);
            } else {
              drawMinimalGeometry(ctx, width, height, palette, currentState, rng);
            }
            break;
          case "soft-blocks":
            drawBlockGeometry(ctx, width, height, palette, currentState, rng);
            break;
          case "fluid-blobs":
            drawFluidBlobGeometry(ctx, width, height, palette, currentState, rng);
            break;
          case "flow-ribbons":
            drawOrganicGeometry(ctx, width, height, palette, currentState, rng);
            break;
          case "reeded-column":
            drawReededGlassGeometry(ctx, width, height, palette, currentState, rng);
            break;
          case "arched-pillars":
            drawArchedPillarGeometry(ctx, width, height, palette, currentState, rng);
            break;
          case "mirror-slices":
            drawMirrorSliceGeometry(ctx, width, height, palette, currentState, rng);
            break;
          case "orbital-tether":
            drawOrbitalTetherGeometry(ctx, width, height, palette, currentState, rng);
            break;
          default:
            drawMinimalGeometry(ctx, width, height, palette, currentState, rng);
        }
      }

      function drawAccentMode(ctx, width, height, palette, currentState, rng) {
        drawAccentLayer(ctx, width, height, palette, currentState, rng);
      }

      function drawTextureMode(ctx, width, height, palette, currentState, rng) {
        drawTextureLayer(ctx, width, height, palette, currentState, rng);
      }

      function renderReededGlassMode(ctx, width, height, palette, currentState, rng) {
        const backgroundLayer = createLayer(width, height);
        drawBackgroundMode(backgroundLayer.ctx, width, height, palette, currentState, rng);
        drawReededGlassBackplate(backgroundLayer.ctx, width, height, palette, currentState);
        drawReededRefractionScene(backgroundLayer.ctx, width, height, palette, currentState);

        const composition = buildReededFieldComposition(width, height, currentState, rng);
        const usedShader = renderReededGlassPass(backgroundLayer.canvas, ctx, width, height, palette, currentState, composition);
        if (!usedShader) {
          drawReededColumnDisplacement(ctx, backgroundLayer.canvas, width, height, palette, currentState, composition);
          drawReededGlassMaterialOverlay(ctx, width, height, palette, currentState, composition);
        }
        drawReededSvgMaterial(ctx, width, height, palette, currentState, composition);
      }

      function renderArtwork(ctx, outputWidth, outputHeight, currentState) {
        const palette = palettes[currentState.palette];
        const rng = makeRng(currentState.seed);

        ctx.clearRect(0, 0, outputWidth, outputHeight);
        if (currentState.shapeMode === "reeded-column") {
          renderReededGlassMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
          drawAccentMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
          if (currentState.textureMode !== "prism-glass") {
            drawTextureMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
          }
          drawArtworkFinishingPass(ctx, outputWidth, outputHeight, palette, currentState, rng);
          return;
        }
        drawBackgroundMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
        drawShapeMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
        drawAccentMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
        drawTextureMode(ctx, outputWidth, outputHeight, palette, currentState, rng);
        drawArtworkFinishingPass(ctx, outputWidth, outputHeight, palette, currentState, rng);
      }

      function computePreviewSurface() {
        const stageRect = elements.previewStage.getBoundingClientRect();
        const stageStyle = window.getComputedStyle(elements.previewStage);
        const paddingX = parseFloat(stageStyle.paddingLeft) + parseFloat(stageStyle.paddingRight);
        const paddingY = parseFloat(stageStyle.paddingTop) + parseFloat(stageStyle.paddingBottom);
        const rowGap = parseFloat(stageStyle.rowGap) || 0;
        const metaElement = elements.previewStage.querySelector(".preview-meta");
        const metaRect = metaElement?.getBoundingClientRect();
        const metaStyle = metaElement ? window.getComputedStyle(metaElement) : null;
        const metaMarginY = metaStyle
          ? (parseFloat(metaStyle.marginTop) || 0) + (parseFloat(metaStyle.marginBottom) || 0)
          : 0;
        const innerAir = Math.max(18, Math.min(34, stageRect.height * 0.045));
        const stageWidth = Math.max(stageRect.width - paddingX - innerAir * 2, 220);
        const stageHeight = Math.max(stageRect.height - paddingY - rowGap - (metaRect?.height ?? 0) - metaMarginY - innerAir * 2, 320);
        const ratio = state.width / state.height;
        let displayWidth = stageWidth;
        let displayHeight = displayWidth / ratio;

        if (displayHeight > stageHeight) {
          displayHeight = stageHeight;
          displayWidth = displayHeight * ratio;
        }

        const dpr = Math.max(window.devicePixelRatio || 1, 1);
        return {
          cssWidth: Math.round(displayWidth),
          cssHeight: Math.round(displayHeight),
          pixelWidth: Math.max(1, Math.round(displayWidth * dpr)),
          pixelHeight: Math.max(1, Math.round(displayHeight * dpr)),
        };
      }

      function renderPreview() {
        const surface = computePreviewSurface();
        elements.canvas.width = surface.pixelWidth;
        elements.canvas.height = surface.pixelHeight;
        elements.canvas.style.width = `${surface.cssWidth}px`;
        elements.canvas.style.height = `${surface.cssHeight}px`;
        const ctx = elements.canvas.getContext("2d", { alpha: false, willReadFrequently: true });
        renderArtwork(ctx, surface.pixelWidth, surface.pixelHeight, state);
      }

      function queueRender() {
        if (renderToken) {
          return;
        }
        renderToken = window.requestAnimationFrame(() => {
          renderToken = 0;
          syncControlValues();
          renderPreview();
        });
      }

      function bindCommonControls() {
        elements.backgroundModeSelect.addEventListener("change", (event) => {
          applyModeChange("backgroundMode", event.currentTarget.value);
        });

        elements.shapeModeSelect.addEventListener("change", (event) => {
          applyModeChange("shapeMode", event.currentTarget.value);
        });

        elements.textureModeSelect.addEventListener("change", (event) => {
          applyModeChange("textureMode", event.currentTarget.value);
        });

        elements.sizePreset.addEventListener("change", (event) => {
          applySizePreset(event.currentTarget.value);
        });

        elements.paletteSelect.addEventListener("change", (event) => {
          state.palette = event.currentTarget.value;
          queueRender();
          refreshCandidates({ silent: true });
        });

        elements.densityInput.addEventListener("input", (event) => {
          state.density = Number(event.currentTarget.value);
          queueRender();
        });

        elements.complexityInput.addEventListener("input", (event) => {
          state.complexity = Number(event.currentTarget.value);
          queueRender();
        });

        elements.seedInput.addEventListener("change", (event) => {
          const value = normalizeSeed(event.currentTarget.value);
          state.seed = value;
          event.currentTarget.value = String(value);
          queueRender();
        });

        ["width", "height"].forEach((fieldName) => {
          const input = fieldName === "width" ? elements.widthInput : elements.heightInput;
          input.addEventListener("change", () => {
            if (validateDimensionInput(fieldName)) {
              queueRender();
            }
          });
        });

        elements.regenerateButton.addEventListener("click", () => {
          state.seed = nextSeed();
          syncControlValues();
          queueRender();
          refreshCandidates({ silent: true });
        });

        elements.randomizeButton.addEventListener("click", () => {
          randomizeCurrentComposition();
          setFeedback("已生成一组新的参数组合", "success");
        });

        elements.randomizeMixButton.addEventListener("click", () => {
          randomizeMix();
          setFeedback("已生成一组新的混搭组合", "success");
        });

        elements.resetButton.addEventListener("click", () => {
          resetCurrentPreset();
        });

        elements.exportButton.addEventListener("click", () => {
          void exportPng();
        });

        elements.refreshCandidatesButton.addEventListener("click", () => {
          refreshCandidates();
        });

        window.addEventListener("resize", queueRender);
      }

      function getExportStrategy(protocol = window.location.protocol, userAgent = window.navigator.userAgent) {
        const normalizedProtocol = String(protocol || "").toLowerCase();
        const normalizedAgent = String(userAgent || "").toLowerCase();
        const isFileProtocol = normalizedProtocol === "file:";
        const isSafari = normalizedAgent.includes("safari")
          && !normalizedAgent.includes("chrome")
          && !normalizedAgent.includes("chromium")
          && !normalizedAgent.includes("android");
        return isFileProtocol || isSafari ? "data-url" : "blob";
      }

      function triggerAnchorDownload(href, fileName) {
        const anchor = document.createElement("a");
        anchor.href = href;
        anchor.download = fileName;
        anchor.rel = "noopener";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      async function exportPng() {
        try {
          const exportCanvas = document.createElement("canvas");
          exportCanvas.width = state.width;
          exportCanvas.height = state.height;
          const exportContext = exportCanvas.getContext("2d", { alpha: false, willReadFrequently: true });
          renderArtwork(exportContext, state.width, state.height, state);
          const fileName = `wallpaper-${state.preset}-${state.width}x${state.height}-${state.seed}.png`;
          const strategy = getExportStrategy();

          if (strategy === "data-url") {
            const href = exportCanvas.toDataURL("image/png");
            triggerAnchorDownload(href, fileName);
            setFeedback(`已开始导出 ${fileName}`, "success", 2800);
            return fileName;
          }

          const blob = await new Promise((resolve) => exportCanvas.toBlob(resolve, "image/png"));
          if (!blob) {
            const href = exportCanvas.toDataURL("image/png");
            triggerAnchorDownload(href, fileName);
            setFeedback(`已开始导出 ${fileName}`, "success", 2800);
            return fileName;
          }

          const href = URL.createObjectURL(blob);
          triggerAnchorDownload(href, fileName);
          window.setTimeout(() => URL.revokeObjectURL(href), 60000);
          setFeedback(`已开始导出 ${fileName}`, "success", 2800);
          return fileName;
        } catch (error) {
          setFeedback(`导出失败：${error.message}`, "error", 3200);
          throw error;
        }
      }

      function initialize() {
        ensureReededMaterialAsset();
        buildPresetButtons();
        buildSelectOptions();
        bindCommonControls();
        syncPresetSelection();
        updateDerivedSizePreset();
        syncControlValues();
        renderAdvancedControls();
        renderPreview();
        refreshCandidates({ silent: true });
      }

      function getCanvasSignature() {
        const sampleWidth = Math.min(64, elements.canvas.width);
        const sampleHeight = Math.min(64, elements.canvas.height);
        const sampleCanvas = document.createElement("canvas");
        sampleCanvas.width = sampleWidth;
        sampleCanvas.height = sampleHeight;
        const sampleContext = sampleCanvas.getContext("2d", { willReadFrequently: true });
        sampleContext.drawImage(elements.canvas, 0, 0, sampleWidth, sampleHeight);
        const pixels = sampleContext.getImageData(0, 0, sampleWidth, sampleHeight).data;
        let total = 0;
        for (let index = 0; index < pixels.length; index += 16) {
          total += pixels[index] + pixels[index + 1] + pixels[index + 2];
        }
        return total;
      }

      window.__app = {
        getState: () => JSON.parse(JSON.stringify(state)),
        switchPreset,
        applyModeChange,
        randomizeCurrentComposition,
        randomizeCurrentPreset,
        randomizeMix,
        resetCurrentPreset,
        refreshCandidates,
        applyCandidate,
        exportPng,
        getExportStrategy,
        getCanvasSignature,
        renderPreview,
      };

      window.__wallpaperDebug = {
        getReededShaderRenderer,
        renderReededGlassPass,
        getReededRendererStatus: () => ({
          ready: Boolean(reededShaderState.renderer) && !reededShaderState.failed,
          failed: reededShaderState.failed,
          reason: reededShaderState.reason,
        }),
        setForceReededFallback(value) {
          reededShaderDebug.forceFallback = Boolean(value);
        },
      };

      initialize();
    </script>
  </body>
</html>
