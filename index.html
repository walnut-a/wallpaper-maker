<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallpaper Maker</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f4efe8;
        --page-tint: #ede6dd;
        --panel-bg: rgba(250, 246, 241, 0.94);
        --panel-strong: rgba(255, 252, 247, 0.96);
        --panel-border: rgba(77, 64, 53, 0.12);
        --preview-shell: rgba(250, 248, 244, 0.96);
        --preview-border: rgba(78, 63, 50, 0.1);
        --text-strong: #2d231c;
        --text-main: #56483d;
        --text-muted: #87786c;
        --text-soft: #a09286;
        --accent: #8a6049;
        --accent-soft: rgba(138, 96, 73, 0.12);
        --accent-strong: #704634;
        --danger: #b4513d;
        --line-strong: rgba(77, 64, 53, 0.18);
        --shadow-soft: 0 18px 60px rgba(72, 53, 40, 0.08);
        --shadow-preview: 0 24px 80px rgba(54, 41, 30, 0.12);
        --radius-xl: 28px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --panel-width: min(25rem, 100%);
        --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", "Baskerville", serif;
        --font-body: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at top left, rgba(173, 141, 120, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(123, 104, 87, 0.08), transparent 32%),
          linear-gradient(180deg, var(--page-bg), var(--page-tint));
        color: var(--text-main);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(96, 74, 53, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(96, 74, 53, 0.025) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at center, black 22%, transparent 82%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at center, transparent 58%, rgba(96, 74, 53, 0.07) 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        display: grid;
        height: 100vh;
        min-height: 100vh;
        grid-template-columns: minmax(18rem, var(--panel-width)) minmax(0, 1fr);
      }

      .control-panel {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        padding: 1.6rem;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel-bg));
        border-right: 1px solid var(--panel-border);
        box-shadow:
          inset -1px 0 0 rgba(255, 255, 255, 0.34),
          18px 0 48px rgba(74, 58, 44, 0.06);
        height: 100vh;
        overflow: auto;
        overflow-x: hidden;
        z-index: 1;
        backdrop-filter: blur(14px);
      }

      .control-panel::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 8.5rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.46), transparent);
        pointer-events: none;
      }

      .panel-head {
        display: grid;
        gap: 0.45rem;
      }

      .hero-mark {
        margin: 0;
        color: var(--text-strong);
        font-size: clamp(2.55rem, 4vw, 4.25rem);
        line-height: 0.92;
        letter-spacing: -0.045em;
        font-weight: 600;
      }

      h1 {
        margin: 0;
        max-width: 26ch;
        color: var(--text-main);
        font-size: 0.98rem;
        font-weight: 400;
        line-height: 1.72;
        letter-spacing: 0;
      }

      .feedback {
        min-height: 1.35rem;
        padding: 0.25rem 0 0;
        color: var(--text-muted);
        font-size: 0.87rem;
      }

      .feedback[data-tone="error"] {
        color: var(--danger);
      }

      .feedback[data-tone="success"] {
        color: var(--accent-strong);
      }

      .panel-section {
        display: grid;
        gap: 0.85rem;
        padding-top: 1.1rem;
        border-top: 1px solid rgba(77, 64, 53, 0.1);
      }

      .panel-section:first-of-type {
        padding-top: 0;
        border-top: 0;
      }

      .section-title {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.73rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .preset-grid {
        display: grid;
        gap: 0.65rem;
      }

      .preset-option {
        display: grid;
        gap: 0.28rem;
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(77, 64, 53, 0.12);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.58);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.44);
        text-align: left;
        color: var(--text-main);
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .preset-option:hover,
      .preset-option:focus-visible {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 12px 28px rgba(77, 61, 47, 0.06);
        outline: none;
      }

      .preset-option.is-active {
        background: linear-gradient(180deg, rgba(138, 96, 73, 0.13), rgba(138, 96, 73, 0.06));
        border-color: rgba(112, 70, 52, 0.28);
        box-shadow: 0 12px 32px rgba(77, 61, 47, 0.08);
      }

      .preset-name {
        color: var(--text-strong);
        font-size: 0.96rem;
        font-weight: 600;
      }

      .field-grid {
        display: grid;
        gap: 0.9rem;
      }

      .two-column {
        display: grid;
        gap: 0.8rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 0.38rem;
      }

      .field label,
      .slider-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.6rem;
        color: var(--text-main);
        font-size: 0.84rem;
        font-weight: 500;
      }

      .value-badge {
        color: var(--text-muted);
        font-size: 0.76rem;
      }

      .field input[type="number"],
      .field select {
        width: 100%;
        height: 3rem;
        padding: 0 0.96rem;
        border: 1px solid rgba(77, 64, 53, 0.14);
        border-radius: 1.05rem;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text-strong);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52);
      }

      .field select {
        appearance: none;
        padding-right: 3rem;
        background-image: url("data:image/svg+xml,%3Csvg width='14' height='10' viewBox='0 0 14 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 2.25L7 7.25L12 2.25' stroke='%2363564B' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 1rem center;
        background-size: 14px 10px;
      }

      .field input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .field input:hover,
      .field select:hover {
        border-color: var(--line-strong);
      }

      .field input:focus-visible,
      .field select:focus-visible,
      .action-button:focus-visible,
      .preset-option:focus-visible,
      summary:focus-visible {
        outline: none;
        border-color: color-mix(in srgb, var(--accent) 56%, rgba(77, 64, 53, 0.14));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.64),
          0 0 0 4px rgba(138, 96, 73, 0.11);
      }

      .field-help {
        color: var(--text-muted);
        font-size: 0.75rem;
        line-height: 1.4;
      }

      .action-grid {
        display: grid;
        gap: 0.7rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .action-button {
        appearance: none;
        min-height: 3rem;
        padding: 0.8rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(77, 64, 53, 0.12);
        background: rgba(255, 255, 255, 0.56);
        color: var(--text-strong);
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.44);
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .action-button:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 24px rgba(77, 61, 47, 0.08);
      }

      .action-button.primary {
        border-color: rgba(112, 70, 52, 0.22);
        background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 84%, #5a4330) 100%);
        color: rgba(255, 249, 242, 0.96);
        box-shadow: 0 16px 28px rgba(45, 36, 29, 0.16);
      }

      .action-button.primary:hover {
        border-color: rgba(112, 70, 52, 0.32);
        background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 92%, white), color-mix(in srgb, var(--accent) 84%, #5a4330));
        box-shadow: 0 20px 34px rgba(45, 36, 29, 0.2);
      }

      .advanced-panel {
        border: 1px solid rgba(77, 64, 53, 0.1);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.5);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
        overflow: clip;
      }

      .advanced-panel summary {
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.05rem;
        cursor: pointer;
        color: var(--text-strong);
        font-size: 0.88rem;
        font-weight: 600;
      }

      .advanced-panel summary::-webkit-details-marker {
        display: none;
      }

      .advanced-hint {
        color: var(--text-muted);
        font-size: 0.76rem;
        font-weight: 400;
      }

      .advanced-panel[open] summary {
        border-bottom: 1px solid rgba(77, 64, 53, 0.08);
      }

      .advanced-content {
        display: grid;
        gap: 1rem;
        padding: 1rem 1.05rem 1.1rem;
      }

      .advanced-group {
        display: grid;
        gap: 0.85rem;
      }

      .advanced-group-title {
        color: var(--text-strong);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .preview-panel {
        display: grid;
        place-items: stretch;
        height: 100vh;
        min-height: 100vh;
        padding: clamp(1rem, 2vw, 1.6rem);
      }

      .preview-stage {
        position: relative;
        display: grid;
        place-items: center;
        height: 100%;
        min-height: 0;
        padding: clamp(1rem, 2vw, 2rem);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.74), rgba(246, 240, 232, 0.92)),
          var(--preview-shell);
        border: 1px solid var(--preview-border);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
      }

      .preview-stage::before {
        content: "";
        position: absolute;
        inset: 1rem;
        border-radius: calc(var(--radius-xl) - 10px);
        border: 1px solid rgba(77, 64, 53, 0.08);
        pointer-events: none;
      }

      #wallpaperCanvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        border-radius: calc(var(--radius-lg) - 2px);
        box-shadow: var(--shadow-preview);
        background: #e8ddd1;
      }

      .preview-meta {
        position: absolute;
        right: clamp(1.1rem, 1.8vw, 1.6rem);
        bottom: clamp(1.1rem, 1.8vw, 1.6rem);
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
        flex-wrap: wrap;
        padding: 0.7rem 0.9rem;
        border-radius: 999px;
        background: rgba(252, 248, 242, 0.78);
        border: 1px solid rgba(77, 64, 53, 0.12);
        backdrop-filter: blur(8px);
        color: var(--text-main);
        font-size: 0.78rem;
      }

      .preview-meta strong {
        color: var(--text-strong);
        font-weight: 600;
      }

      .panel-foot {
        display: flex;
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid rgba(77, 64, 53, 0.1);
      }

      .project-link {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        width: fit-content;
        margin-top: auto;
        color: var(--text-soft);
        font-size: 0.78rem;
        text-decoration: none;
        transition: color 140ms ease;
      }

      .project-link:hover {
        color: var(--text-strong);
      }

      @media (max-width: 1120px) {
        .app-shell {
          grid-template-columns: minmax(19rem, 22rem) minmax(0, 1fr);
        }

        .control-panel {
          padding: 1.35rem;
        }

        .hero-mark {
          font-size: clamp(2.3rem, 4vw, 3.4rem);
        }

        .preview-panel {
          padding: 0.9rem;
        }

        .preview-stage {
          padding: 0.9rem;
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          height: auto;
          grid-template-columns: 1fr;
          grid-template-rows: minmax(32rem, 62svh) auto;
        }

        .control-panel {
          order: 2;
          border-right: 0;
          border-top: 1px solid var(--panel-border);
          height: auto;
          overflow: visible;
          padding: 1.15rem 1rem 1.4rem;
        }

        .preview-panel {
          order: 1;
          height: auto;
          min-height: 58svh;
          padding: 0.8rem;
        }

        .hero-mark {
          font-size: clamp(2.3rem, 9vw, 3.4rem);
        }

        .preview-stage {
          padding: 0.75rem;
        }

        .preview-stage::before {
          inset: 0.75rem;
        }
      }

      @media (max-width: 640px) {
        .action-grid,
        .two-column {
          grid-template-columns: 1fr;
        }

        h1 {
          font-size: 0.92rem;
        }

        .preview-meta {
          left: 1rem;
          right: 1rem;
          justify-content: space-between;
          border-radius: 18px;
        }

        .preview-panel {
          min-height: 60svh;
        }

        .preview-stage {
          padding: 0.7rem;
        }

        .preview-stage::before {
          inset: 0.7rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-panel">
        <header class="panel-head">
          <p class="hero-mark">Wallpaper Maker</p>
          <h1>参数化生成手机壁纸</h1>
          <div id="feedback" class="feedback" aria-live="polite"></div>
        </header>

        <section class="panel-section" aria-labelledby="preset-heading">
          <h2 id="preset-heading" class="section-title">风格预设</h2>
          <div id="presetGrid" class="preset-grid"></div>
        </section>

        <section class="panel-section" aria-labelledby="size-heading">
          <h2 id="size-heading" class="section-title">尺寸与基础参数</h2>
          <div class="field-grid">
            <div class="field">
              <label for="sizePreset">尺寸预设</label>
              <select id="sizePreset" name="sizePreset"></select>
            </div>
            <div class="two-column">
              <div class="field">
                <label for="widthInput">宽度</label>
                <input id="widthInput" name="width" type="number" min="320" max="6000" step="1" inputmode="numeric" />
              </div>
              <div class="field">
                <label for="heightInput">高度</label>
                <input id="heightInput" name="height" type="number" min="320" max="6000" step="1" inputmode="numeric" />
              </div>
            </div>
            <div class="field">
              <label for="paletteSelect">调色板</label>
              <select id="paletteSelect" name="palette"></select>
            </div>
            <div class="field">
              <div class="slider-header">
                <label for="densityInput">密度</label>
                <span id="densityValue" class="value-badge">45%</span>
              </div>
              <input id="densityInput" name="density" type="range" min="0.15" max="0.95" step="0.01" />
            </div>
            <div class="field">
              <div class="slider-header">
                <label for="complexityInput">复杂度</label>
                <span id="complexityValue" class="value-badge">50%</span>
              </div>
              <input id="complexityInput" name="complexity" type="range" min="0.1" max="0.95" step="0.01" />
            </div>
            <div class="field">
              <label for="seedInput">随机种子</label>
              <input id="seedInput" name="seed" type="number" min="1" max="999999999" step="1" inputmode="numeric" />
              <div class="field-help">相同参数和相同种子会得到相同画面。</div>
            </div>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="actions-heading">
          <h2 id="actions-heading" class="section-title">动作</h2>
          <div class="action-grid">
            <button id="regenerateButton" class="action-button" type="button">重新生成</button>
            <button id="randomizeButton" class="action-button" type="button">随机参数</button>
            <button id="resetButton" class="action-button" type="button">重置当前预设</button>
            <button id="exportButton" class="action-button primary" type="button">导出 PNG</button>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="advanced-heading">
          <h2 id="advanced-heading" class="section-title">高级参数</h2>
          <details id="advancedPanel" class="advanced-panel">
            <summary>
              <span>展开细调</span>
              <span class="advanced-hint">默认收起，避免参数墙</span>
            </summary>
            <div id="advancedContent" class="advanced-content"></div>
          </details>
        </section>

        <div class="panel-foot">
          <a
            class="project-link"
            href="https://github.com/walnut-a/wallpaper-maker"
            target="_blank"
            rel="noreferrer"
          >
            View on Github
          </a>
        </div>
      </aside>

      <section class="preview-panel">
        <div id="previewStage" class="preview-stage">
          <canvas id="wallpaperCanvas" aria-label="壁纸预览"></canvas>
          <div class="preview-meta">
            <span><strong id="previewPresetLabel">极简秩序感</strong></span>
            <span id="previewSizeLabel">1290 × 2796</span>
            <span id="previewPaletteLabel">暮光陶土</span>
          </div>
        </div>
      </section>
    </main>

    <script>
      const sizePresets = [
        { value: "iphone-pro-max", label: "iPhone Pro Max", width: 1290, height: 2796 },
        { value: "iphone-pro", label: "iPhone Pro", width: 1179, height: 2556 },
        { value: "android-tall", label: "Android 高屏", width: 1440, height: 3200 },
        { value: "classic-9-16", label: "传统 9:16", width: 1080, height: 1920 },
      ];
      const defaultSizePreset = sizePresets.find((item) => item.value === "classic-9-16") ?? sizePresets[0];

      const palettes = {
        dawn: {
          label: "暮光陶土",
          backgroundA: "#f7ddd2",
          backgroundB: "#f5f0ea",
          surface: "#b7d6f2",
          ink: "#1f3e6d",
          accent: "#ee7f63",
          accentSoft: "#f6d7bc",
        },
        harbor: {
          label: "港口薄雾",
          backgroundA: "#edf2ef",
          backgroundB: "#dfe8e3",
          surface: "#88b6c4",
          ink: "#234256",
          accent: "#d99e73",
          accentSoft: "#cfe0da",
        },
        linen: {
          label: "亚麻石灰",
          backgroundA: "#f5efe6",
          backgroundB: "#e7ded0",
          surface: "#c9d8e8",
          ink: "#3c342d",
          accent: "#ba845e",
          accentSoft: "#ebe0cb",
        },
        dusk: {
          label: "暮海灰蓝",
          backgroundA: "#17385b",
          backgroundB: "#091f34",
          surface: "#3e86cf",
          ink: "#050f1d",
          accent: "#f36c2e",
          accentSoft: "#f2d5c6",
        },
        mineral: {
          label: "矿物砂红",
          backgroundA: "#f7e7db",
          backgroundB: "#e9d4c8",
          surface: "#7fb4e8",
          ink: "#3d261f",
          accent: "#d4573e",
          accentSoft: "#f1ddd1",
        },
      };

      const presetDefinitions = {
        "minimal-grid": {
          label: "极简秩序感",
          note: "大形体退后，底纹很轻，整体更像被光擦过的构图。",
          defaults: {
            palette: "dawn",
            density: 0.38,
            complexity: 0.46,
            advanced: {
              shapeCount: 0.32,
              softness: 0.76,
              glowRadius: 0.68,
              patternStrength: 0.18,
              lightDrift: 0.42,
              grainFine: 0.16,
            },
          },
          groups: [
            {
              title: "形体",
              controls: [
                { key: "shapeCount", label: "主形体数量", min: 0.08, max: 0.72, step: 0.01, format: "percent" },
                { key: "softness", label: "边缘软化", min: 0.18, max: 0.95, step: 0.01, format: "percent" },
                { key: "glowRadius", label: "光晕半径", min: 0.18, max: 0.95, step: 0.01, format: "percent" },
              ],
            },
            {
              title: "气氛",
              controls: [
                { key: "patternStrength", label: "底纹强度", min: 0, max: 0.5, step: 0.01, format: "percent" },
                { key: "lightDrift", label: "冷暖偏移", min: 0, max: 1, step: 0.01, format: "percent" },
                { key: "grainFine", label: "颗粒细度", min: 0, max: 0.4, step: 0.01, format: "percent" },
              ],
            },
          ],
        },
        "bold-blocks": {
          label: "大色块构成",

      const elements = {
        presetGrid: document.getElementById("presetGrid"),
        sizePreset: document.getElementById("sizePreset"),
        widthInput: document.getElementById("widthInput"),
        heightInput: document.getElementById("heightInput"),
        paletteSelect: document.getElementById("paletteSelect"),
        densityInput: document.getElementById("densityInput"),
        densityValue: document.getElementById("densityValue"),
        complexityInput: document.getElementById("complexityInput"),
        complexityValue: document.getElementById("complexityValue"),
        seedInput: document.getElementById("seedInput"),
        regenerateButton: document.getElementById("regenerateButton"),
        randomizeButton: document.getElementById("randomizeButton"),
        resetButton: document.getElementById("resetButton"),
        exportButton: document.getElementById("exportButton"),
        feedback: document.getElementById("feedback"),
        advancedPanel: document.getElementById("advancedPanel"),
        advancedContent: document.getElementById("advancedContent"),
        previewStage: document.getElementById("previewStage"),
        canvas: document.getElementById("wallpaperCanvas"),
        previewPresetLabel: document.getElementById("previewPresetLabel"),
        previewSizeLabel: document.getElementById("previewSizeLabel"),
        previewPaletteLabel: document.getElementById("previewPaletteLabel"),
      };

      function buildDefaultState(presetKey) {
        const preset = presetDefinitions[presetKey];
        return {
          preset: presetKey,
          sizePreset: defaultSizePreset.value,
          width: defaultSizePreset.width,
          height: defaultSizePreset.height,
          seed: 314159,
          palette: preset.defaults.palette,
          density: preset.defaults.density,
          complexity: preset.defaults.complexity,
          advanced: { ...preset.defaults.advanced },
        };
      }

      let state = buildDefaultState("minimal-grid");
      let lastValidDimensions = { width: state.width, height: state.height };
      let feedbackTimer = 0;
      let renderToken = 0;

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function normalizeSeed(seed) {
        const numeric = Number.isFinite(Number(seed)) ? Math.abs(Math.trunc(Number(seed))) : 1;
        return numeric === 0 ? 1 : numeric % 2147483647;
      }

      function makeRng(seed) {
        let current = normalizeSeed(seed);
        return function next() {
          current += 0x6d2b79f5;
          let result = Math.imul(current ^ (current >>> 15), current | 1);
          result ^= result + Math.imul(result ^ (result >>> 7), result | 61);
          return ((result ^ (result >>> 14)) >>> 0) / 4294967296;
        };
      }

      function choose(rng, items) {
        return items[Math.floor(rng() * items.length)];
      }

      function formatPercent(value) {
        return `${Math.round(Number(value) * 100)}%`;
      }

      function setFeedback(message, tone = "neutral", hold = 2200) {
        elements.feedback.textContent = message;
        elements.feedback.dataset.tone = tone;
        window.clearTimeout(feedbackTimer);
        if (message) {
          feedbackTimer = window.setTimeout(() => {
            elements.feedback.textContent = "";
            elements.feedback.dataset.tone = "neutral";
          }, hold);
        }
      }

      function findMatchingSizePreset(width, height) {
        const found = sizePresets.find((item) => item.width === width && item.height === height);
        return found ? found.value : "custom";
      }

      function updateDerivedSizePreset() {
        state.sizePreset = findMatchingSizePreset(state.width, state.height);
      }

      function presetAccentAlpha(stateValue, floor = 0.14, ceiling = 0.72) {
        return floor + (ceiling - floor) * clamp(stateValue, 0, 1);
      }

      function buildPresetButtons() {
        elements.presetGrid.innerHTML = "";
        Object.entries(presetDefinitions).forEach(([key, config]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "preset-option";
          button.dataset.preset = key;
          button.innerHTML = `<span class="preset-name">${config.label}</span>`;
          button.addEventListener("click", () => switchPreset(key));
          elements.presetGrid.appendChild(button);
        });
      }

      function buildSelectOptions() {
        elements.sizePreset.innerHTML = "";
        sizePresets.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.value;
          option.textContent = `${item.label} · ${item.width} × ${item.height}`;
          elements.sizePreset.appendChild(option);
        });
        const customOption = document.createElement("option");
        customOption.value = "custom";
        customOption.textContent = "自定义";
        elements.sizePreset.appendChild(customOption);

        elements.paletteSelect.innerHTML = "";
        Object.entries(palettes).forEach(([key, palette]) => {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = palette.label;
          elements.paletteSelect.appendChild(option);
        });
      }

      function formatAdvancedValue(control, value) {
        if (control.format === "percent") {
          return formatPercent(value);
        }
        return `${Number(value).toFixed(2)}`;
      }

      function renderAdvancedControls() {
        const preset = presetDefinitions[state.preset];
        elements.advancedContent.innerHTML = "";

        preset.groups.forEach((group) => {
          const wrapper = document.createElement("section");
          wrapper.className = "advanced-group";

          const title = document.createElement("div");
          title.className = "advanced-group-title";
          title.textContent = group.title;
          wrapper.appendChild(title);

          group.controls.forEach((control) => {
            const field = document.createElement("div");
            field.className = "field";

            const header = document.createElement("div");
            header.className = "slider-header";

            const label = document.createElement("label");
            label.htmlFor = `advanced-${control.key}`;
            label.textContent = control.label;

            const value = document.createElement("span");
            value.className = "value-badge";
            value.id = `advanced-value-${control.key}`;
            value.textContent = formatAdvancedValue(control, state.advanced[control.key]);

            header.appendChild(label);
            header.appendChild(value);

            const input = document.createElement("input");
            input.type = "range";
            input.id = `advanced-${control.key}`;
            input.min = String(control.min);
            input.max = String(control.max);
            input.step = String(control.step);
            input.value = String(state.advanced[control.key]);
            input.dataset.advancedKey = control.key;
            input.addEventListener("input", (event) => {
              const nextValue = Number(event.currentTarget.value);
              state.advanced[control.key] = nextValue;
              value.textContent = formatAdvancedValue(control, nextValue);
              queueRender();
            });

            field.appendChild(header);
            field.appendChild(input);
            wrapper.appendChild(field);
          });

          elements.advancedContent.appendChild(wrapper);
        });
      }

      function syncPresetSelection() {
        elements.presetGrid.querySelectorAll(".preset-option").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.preset === state.preset);
        });
      }

      function syncControlValues() {
        elements.sizePreset.value = state.sizePreset;
        elements.widthInput.value = String(state.width);
        elements.heightInput.value = String(state.height);
        elements.paletteSelect.value = state.palette;
        elements.densityInput.value = String(state.density);
        elements.complexityInput.value = String(state.complexity);
        elements.seedInput.value = String(state.seed);
        elements.densityValue.textContent = formatPercent(state.density);
        elements.complexityValue.textContent = formatPercent(state.complexity);
        elements.previewPresetLabel.textContent = presetDefinitions[state.preset].label;
        elements.previewSizeLabel.textContent = `${state.width} × ${state.height}`;
        elements.previewPaletteLabel.textContent = palettes[state.palette].label;
      }

      function mergePresetDefaults(presetKey, preservePalette = false) {
        const preset = presetDefinitions[presetKey];
        state = {
          ...state,
          preset: presetKey,
          density: preset.defaults.density,
          complexity: preset.defaults.complexity,
          palette: preservePalette ? state.palette : preset.defaults.palette,
          advanced: { ...preset.defaults.advanced },
        };
      }

      function switchPreset(presetKey) {
        mergePresetDefaults(presetKey);
        syncPresetSelection();
        updateDerivedSizePreset();
        syncControlValues();
        renderAdvancedControls();
        setFeedback(`已切换到${presetDefinitions[presetKey].label}`, "success");
        queueRender();
      }

      function applySizePreset(value) {
        const preset = sizePresets.find((item) => item.value === value);
        if (!preset) {
          state.sizePreset = "custom";
          return;
        }
        state.width = preset.width;
        state.height = preset.height;
        state.sizePreset = preset.value;
        lastValidDimensions = { width: state.width, height: state.height };
        syncControlValues();
        queueRender();
      }

      function validateDimensionInput(fieldName) {
        const input = fieldName === "width" ? elements.widthInput : elements.heightInput;
        const parsed = Number(input.value);
        if (!Number.isFinite(parsed) || parsed < 320 || parsed > 6000) {
          input.value = String(lastValidDimensions[fieldName]);
          setFeedback(`${fieldName === "width" ? "宽度" : "高度"}需要在 320 到 6000 之间`, "error", 2600);
          return false;
        }
        const normalized = Math.round(parsed);
        state[fieldName] = normalized;
        lastValidDimensions[fieldName] = normalized;
        updateDerivedSizePreset();
        syncControlValues();
        return true;
      }

      function nextSeed() {
        return Math.floor(Date.now() % 1000000000) + 1;
      }

      function randomizeCurrentPreset() {
        const rng = makeRng(nextSeed());
        const preset = presetDefinitions[state.preset];
        state.seed = Math.floor(rng() * 999999999) + 1;
        state.palette = choose(rng, Object.keys(palettes));
        state.density = Number((0.2 + rng() * 0.62).toFixed(2));
        state.complexity = Number((0.2 + rng() * 0.68).toFixed(2));
        const nextAdvanced = {};
        preset.groups.forEach((group) => {
          group.controls.forEach((control) => {
            const randomized = control.min + rng() * (control.max - control.min);
            nextAdvanced[control.key] = Number(randomized.toFixed(2));
          });
        });
        state.advanced = nextAdvanced;
        syncControlValues();
        renderAdvancedControls();
        queueRender();
      }

      function resetCurrentPreset() {
        const currentPreset = state.preset;
        mergePresetDefaults(currentPreset, false);
        state.seed = 314159;
        state.width = lastValidDimensions.width;
        state.height = lastValidDimensions.height;
        state.sizePreset = findMatchingSizePreset(state.width, state.height);
        syncControlValues();
        renderAdvancedControls();
        queueRender();
        setFeedback("当前预设已恢复默认参数", "success");
      }

      function line(ctx, x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      function hexToRgba(hex, alpha) {
        const clean = hex.replace("#", "");
        const normalized = clean.length === 3
          ? clean.split("").map((char) => char + char).join("")
          : clean;
        const red = Number.parseInt(normalized.slice(0, 2), 16);
        const green = Number.parseInt(normalized.slice(2, 4), 16);
        const blue = Number.parseInt(normalized.slice(4, 6), 16);
        return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
      }

      function createLayer(width, height) {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        return {
          canvas,
          ctx: canvas.getContext("2d", { alpha: true }),
        };
      }

      function paintSoftEllipse(ctx, { x, y, rx, ry, rotation = 0, color, blur = 0, alpha = 1, composite = "source-over" }) {
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.beginPath();
        ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function paintSoftRoundedRect(ctx, { x, y, width, height, radius, color, blur = 0, alpha = 1, composite = "source-over", rotation = 0 }) {
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.translate(x + width / 2, y + height / 2);
        ctx.rotate(rotation);
        roundedRect(ctx, -width / 2, -height / 2, width, height, radius);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();
      }

      function paintSoftRibbon(ctx, points, { color, lineWidth, blur = 0, alpha = 1, composite = "source-over" }) {
        if (points.length < 2) {
          return;
        }
        ctx.save();
        ctx.globalCompositeOperation = composite;
        ctx.globalAlpha = alpha;
        ctx.filter = `blur(${Math.max(0, blur)}px)`;
        ctx.strokeStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let index = 1; index < points.length; index += 1) {
          const previous = points[index - 1];
          const point = points[index];
          const midX = (previous.x + point.x) / 2;
          const midY = (previous.y + point.y) / 2;
          ctx.quadraticCurveTo(previous.x, previous.y, midX, midY);
        }
        const lastPoint = points[points.length - 1];
        ctx.lineTo(lastPoint.x, lastPoint.y);
        ctx.stroke();
        ctx.restore();
      }

      function drawGridPattern(ctx, width, height, spacing, color, alpha) {
        ctx.save();
        ctx.strokeStyle = hexToRgba(color, alpha);
        ctx.lineWidth = 1;
        for (let x = 0; x <= width; x += spacing) {
          line(ctx, x, 0, x, height);
        }
        for (let y = 0; y <= height; y += spacing) {
          line(ctx, 0, y, width, y);
        }
        ctx.restore();
      }

      function drawHexPattern(ctx, width, height, side, color, alpha) {
        const hexHeight = Math.sqrt(3) * side;
        const columnStep = side * 1.5;
        ctx.save();
        ctx.strokeStyle = hexToRgba(color, alpha);
        ctx.lineWidth = 1;
        for (let column = -2; column < Math.ceil(width / columnStep) + 2; column += 1) {
          const centerX = column * columnStep;
          const offsetY = column % 2 === 0 ? 0 : hexHeight * 0.5;
          for (let row = -2; row < Math.ceil(height / hexHeight) + 2; row += 1) {
            const centerY = row * hexHeight + offsetY;
            ctx.beginPath();
            for (let point = 0; point < 6; point += 1) {
              const angle = (Math.PI / 180) * (60 * point - 30);
              const x = centerX + side * Math.cos(angle);
              const y = centerY + side * Math.sin(angle);
              if (point === 0) {
                ctx.moveTo(x, y);
              } else {
                ctx.lineTo(x, y);
              }
            }
            ctx.closePath();
            ctx.stroke();
          }
        }
        ctx.restore();
      }

      function addVignette(ctx, width, height, color, strength) {
        const vignette = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.1, width * 0.5, height * 0.5, width * 0.82);
        vignette.addColorStop(0, hexToRgba(color, 0));
        vignette.addColorStop(1, hexToRgba(color, strength));
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);
      }

      function drawBackground(ctx, width, height, palette, preset, currentState, rng) {
        const driftBase = currentState.advanced.lightDrift
          ?? currentState.advanced.offsetPull
          ?? currentState.advanced.drift
          ?? 0.42;
        const gradient = ctx.createLinearGradient(0, 0, width * (0.4 + driftBase * 0.35), height);
        gradient.addColorStop(0, palette.backgroundA);
        gradient.addColorStop(1, palette.backgroundB);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        const haloX = width * (0.22 + rng() * 0.16);
        const haloY = height * (0.2 + rng() * 0.18);
        const halo = ctx.createRadialGradient(haloX, haloY, 0, haloX, haloY, Math.max(width, height) * 0.78);
        halo.addColorStop(0, hexToRgba(palette.accentSoft, preset === "tech-texture" ? 0.12 : 0.28));
        halo.addColorStop(1, hexToRgba(palette.accentSoft, 0));
        ctx.fillStyle = halo;
        ctx.fillRect(0, 0, width, height);

        if (preset === "tech-texture") {
          const glow = ctx.createRadialGradient(width * 0.74, height * 0.26, 0, width * 0.74, height * 0.26, width * 0.74);
          glow.addColorStop(0, hexToRgba(palette.surface, 0.18));
          glow.addColorStop(1, hexToRgba(palette.surface, 0));
          ctx.fillStyle = glow;
          ctx.fillRect(0, 0, width, height);
          ctx.fillStyle = hexToRgba(palette.ink, 0.12);
          ctx.fillRect(0, 0, width, height);
        }
      }

      function drawMinimalGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const blur = width * (0.045 + currentState.advanced.softness * 0.11 + currentState.advanced.glowRadius * 0.035);
        const extraShapes = Math.round(currentState.advanced.shapeCount * 2 + currentState.density * 2);
        paintSoftEllipse(layer.ctx, {
          x: width * 0.68,
          y: height * 0.34,
          rx: width * (0.18 + currentState.complexity * 0.04),
          ry: height * 0.28,
          rotation: -0.24,
          color: hexToRgba(palette.surface, 0.98),
          blur: blur * 0.54,
        });
        paintSoftRoundedRect(layer.ctx, {
          x: width * 0.5,
          y: height * 0.44,
          width: width * 0.28,
          height: height * 0.48,
          radius: width * 0.14,
          rotation: -0.1,
          color: hexToRgba(palette.ink, 0.44),
          blur: blur * 0.24,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.72,
          y: height * 0.72,
          rx: width * 0.14,
          ry: height * 0.2,
          rotation: -0.08,
          color: hexToRgba(palette.surface, 0.66),
          blur: blur * 0.4,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.28,
          y: height * 0.66,
          rx: width * 0.2,
          ry: height * 0.18,
          rotation: 0.56,
          color: hexToRgba(palette.accentSoft, 0.94),
          blur: blur * 0.78,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.18,
          y: height * 0.18,
          rx: width * 0.22,
          ry: height * 0.18,
          rotation: -0.24,
          color: hexToRgba(palette.accent, 0.2),
          blur: blur * 0.9,
        });
        for (let index = 0; index < extraShapes; index += 1) {
          paintSoftEllipse(layer.ctx, {
            x: width * (0.18 + rng() * 0.64),
            y: height * (0.16 + rng() * 0.68),
            rx: width * (0.08 + rng() * 0.12),
            ry: height * (0.08 + rng() * 0.14),
            rotation: rng() * Math.PI,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.28),
            blur: blur * (0.7 + rng() * 0.35),
          });
        }
        ctx.drawImage(layer.canvas, 0, 0);

        const patternAlpha = 0.008 + currentState.advanced.patternStrength * 0.06;
        const spacing = width * (0.06 + (1 - currentState.density) * 0.06);
        drawGridPattern(ctx, width, height, spacing, palette.ink, patternAlpha);
      }

      function drawBlockGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const shapeCount = 2 + Math.round(currentState.advanced.shapeCount * 3 + currentState.density * 1.5);
        const blur = width * (0.03 + currentState.advanced.softness * 0.09);
        paintSoftRoundedRect(layer.ctx, {
          x: width * 0.06,
          y: height * 0.52,
          width: width * 0.42,
          height: height * 0.24,
          radius: width * 0.12,
          rotation: -0.08,
          color: hexToRgba(palette.accent, 0.82),
          blur,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.74,
          y: height * 0.3,
          rx: width * 0.18,
          ry: height * 0.18,
          color: hexToRgba(palette.surface, 0.84),
          blur: blur * (0.9 + currentState.advanced.glowRadius * 0.45),
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.5,
          y: height * 0.76,
          rx: width * 0.24,
          ry: height * 0.12,
          color: hexToRgba(palette.accentSoft, 0.88),
          blur: blur * (0.82 + currentState.advanced.haze * 0.6),
        });
        for (let index = 0; index < shapeCount; index += 1) {
          paintSoftRoundedRect(layer.ctx, {
            x: width * (0.1 + rng() * 0.55),
            y: height * (0.1 + rng() * 0.65),
            width: width * (0.14 + rng() * 0.16),
            height: height * (0.08 + rng() * 0.12),
            radius: width * (0.08 + currentState.advanced.softness * 0.1),
            rotation: (rng() - 0.5) * currentState.advanced.offsetPull,
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accent, 0.26 + currentState.advanced.tonalSplit * 0.12),
            blur: blur * (0.6 + rng() * 0.5),
          });
        }
        ctx.drawImage(layer.canvas, 0, 0);
        addVignette(ctx, width, height, palette.ink, 0.06 + currentState.advanced.tonalSplit * 0.12);
      }

      function drawTechGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const blur = width * (0.04 + currentState.advanced.softness * 0.08 + currentState.advanced.glowRadius * 0.05);
        const shapeCount = 2 + Math.round(currentState.advanced.shapeCount * 2);
        paintSoftEllipse(layer.ctx, {
          x: width * 0.5,
          y: height * 0.34,
          rx: width * 0.26,
          ry: height * 0.3,
          color: hexToRgba(palette.surface, 0.92),
          blur,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.22,
          y: height * 0.62,
          rx: width * 0.16,
          ry: height * 0.15,
          color: hexToRgba(palette.accent, 0.95),
          blur: blur * 0.88,
        });
        paintSoftEllipse(layer.ctx, {
          x: width * 0.76,
          y: height * 0.58,
          rx: width * 0.2,
          ry: height * 0.18,
          color: hexToRgba(palette.accent, 0.88),
          blur: blur * 0.94,
        });
        for (let index = 0; index < shapeCount; index += 1) {
          paintSoftEllipse(layer.ctx, {
            x: width * (0.18 + rng() * 0.64),
            y: height * (0.18 + rng() * 0.58),
            rx: width * (0.08 + rng() * 0.1),
            ry: height * (0.08 + rng() * 0.12),
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accentSoft, 0.28),
            blur: blur * (0.72 + rng() * 0.36),
          });
        }
        ctx.drawImage(layer.canvas, 0, 0);

        addVignette(ctx, width, height, palette.ink, 0.22 + currentState.advanced.vignette * 0.36);
      }

      function drawOrganicGeometry(ctx, width, height, palette, currentState, rng) {
        const layer = createLayer(width, height);
        const flowCount = 2 + Math.round(currentState.advanced.shapeCount * 2 + currentState.density * 1.5);
        const blur = width * (0.05 + currentState.advanced.softness * 0.08);
        for (let index = 0; index < flowCount; index += 1) {
          const points = [];
          const baseY = height * (0.18 + (index / Math.max(1, flowCount - 1)) * 0.6);
          for (let step = 0; step <= 8; step += 1) {
            const t = step / 8;
            points.push({
              x: width * t,
              y: baseY
                + Math.sin(t * Math.PI * (1.2 + currentState.advanced.drift * 2.6) + index * 0.7) * height * (0.06 + currentState.advanced.stretch * 0.08)
                + (rng() - 0.5) * height * 0.06,
            });
          }
          paintSoftRibbon(layer.ctx, points, {
            color: hexToRgba(index % 2 === 0 ? palette.surface : palette.accent, 0.42),
            lineWidth: width * (0.09 + currentState.complexity * 0.06),
            blur: blur * (0.85 + currentState.advanced.glowRadius * 0.3),
          });
        }
        paintSoftEllipse(layer.ctx, {
          x: width * 0.28,
          y: height * 0.64,
          rx: width * 0.2,
          ry: height * 0.14,
          rotation: 0.42,
          color: hexToRgba(palette.accentSoft, 0.72),
          blur: blur * 0.9,
        });
        ctx.drawImage(layer.canvas, 0, 0);

        paintSoftEllipse(ctx, {
          x: width * 0.58,
          y: height * 0.48,
          rx: width * 0.24,
          ry: height * 0.18,
          rotation: -0.18,
          color: hexToRgba(palette.accentSoft, 0.16 + currentState.advanced.veil * 0.18),
          blur: blur * 0.6,
        });
      }

      function drawAccentLayer(ctx, width, height, palette, currentState, rng) {
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        if (currentState.preset === "minimal-grid") {
          paintSoftEllipse(ctx, {
            x: width * (0.28 + currentState.advanced.lightDrift * 0.22),
            y: height * 0.18,
            rx: width * 0.16,
            ry: height * 0.08,
            color: hexToRgba(palette.accent, 0.18),
            blur: width * 0.04,
          });
        }
        if (currentState.preset === "bold-blocks") {
          paintSoftRoundedRect(ctx, {
            x: width * 0.54,
            y: height * 0.16,
            width: width * 0.24,
            height: height * 0.18,
            radius: width * 0.08,
            rotation: 0.22,
            color: hexToRgba(palette.ink, 0.18 + currentState.advanced.tonalSplit * 0.08),
            blur: width * 0.025,
          });
        }
        if (currentState.preset === "tech-texture") {
          const gradient = ctx.createLinearGradient(width * 0.14, height * 0.76, width * 0.76, height * 0.24);
          gradient.addColorStop(0, hexToRgba(palette.surface, 0));
          gradient.addColorStop(0.5, hexToRgba(palette.accent, 0.14));
          gradient.addColorStop(1, hexToRgba(palette.surface, 0));
          ctx.strokeStyle = gradient;
          ctx.lineWidth = 5 + currentState.advanced.glowRadius * 10;
          ctx.beginPath();
          ctx.moveTo(width * 0.18, height * 0.82);
          ctx.lineTo(width * 0.74, height * 0.28);
          ctx.stroke();
        }
        if (currentState.preset === "organic-flow") {
          ctx.fillStyle = hexToRgba(palette.accentSoft, 0.08 + currentState.advanced.veil * 0.2);
          for (let i = 0; i < 3; i += 1) {
            const x = width * (0.12 + rng() * 0.6);
            const y = height * (0.14 + rng() * 0.62);
            const w = width * (0.16 + rng() * 0.24);
            const h = height * (0.12 + rng() * 0.22);
            ctx.beginPath();
            ctx.ellipse(x, y, w, h, rng() * Math.PI, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.restore();
      }

      function drawTextureLayer(ctx, width, height, palette, currentState, rng) {
        const fineGrain = currentState.advanced.grainFine ?? 0.14;
        const noiseIntensity = currentState.preset === "tech-texture"
          ? 0.09 + currentState.complexity * 0.04
          : currentState.preset === "minimal-grid"
            ? 0.05 + fineGrain * 0.35
            : 0.05 + currentState.complexity * 0.05 + currentState.density * 0.03;

        if (noiseIntensity > 0.01) {
          const dots = Math.round(width * height * (0.00018 + noiseIntensity * 0.0007));
          ctx.fillStyle = hexToRgba(palette.ink, 0.04 + noiseIntensity * 0.04);
          for (let i = 0; i < dots; i += 1) {
            const x = rng() * width;
            const y = rng() * height;
            const size = 0.2 + rng() * (0.8 + noiseIntensity);
            ctx.fillRect(x, y, size, size);
          }
        }

        if (currentState.preset === "tech-texture") {
          const step = 7 + currentState.advanced.patternStrength * 12;
          ctx.strokeStyle = hexToRgba(palette.accentSoft, 0.04);
          ctx.lineWidth = 1;
          for (let y = 0; y < height; y += step) {
            line(ctx, 0, y, width, y);
          }
          const side = width * (0.012 + currentState.advanced.cellScale * 0.02);
          drawHexPattern(ctx, width, height, side, palette.accentSoft, 0.04 + currentState.advanced.patternStrength * 0.07);
          drawHexPattern(ctx, width, height, side, palette.ink, 0.1 + currentState.advanced.patternStrength * 0.16);
        }
      }

      function roundedRect(ctx, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
        ctx.closePath();
      }

      function renderArtwork(ctx, outputWidth, outputHeight, currentState) {
        const palette = palettes[currentState.palette];
        const rng = makeRng(currentState.seed);

        ctx.clearRect(0, 0, outputWidth, outputHeight);
        drawBackground(ctx, outputWidth, outputHeight, palette, currentState.preset, currentState, rng);

        switch (currentState.preset) {
          case "minimal-grid":
            drawMinimalGeometry(ctx, outputWidth, outputHeight, palette, currentState, rng);
            break;
          case "bold-blocks":
            drawBlockGeometry(ctx, outputWidth, outputHeight, palette, currentState, rng);
            break;
          case "tech-texture":
            drawTechGeometry(ctx, outputWidth, outputHeight, palette, currentState, rng);
            break;
          case "organic-flow":
            drawOrganicGeometry(ctx, outputWidth, outputHeight, palette, currentState, rng);
            break;
          default:
            drawMinimalGeometry(ctx, outputWidth, outputHeight, palette, currentState, rng);
        }

        drawAccentLayer(ctx, outputWidth, outputHeight, palette, currentState, rng);
        drawTextureLayer(ctx, outputWidth, outputHeight, palette, currentState, rng);
      }

      function computePreviewSurface() {
        const stageRect = elements.previewStage.getBoundingClientRect();
        const stageWidth = Math.max(stageRect.width - 52, 220);
        const stageHeight = Math.max(stageRect.height - 52, 320);
        const ratio = state.width / state.height;
        let displayWidth = stageWidth;
        let displayHeight = displayWidth / ratio;

        if (displayHeight > stageHeight) {
          displayHeight = stageHeight;
          displayWidth = displayHeight * ratio;
        }

        const dpr = Math.max(window.devicePixelRatio || 1, 1);
        return {
          cssWidth: Math.round(displayWidth),
          cssHeight: Math.round(displayHeight),
          pixelWidth: Math.max(1, Math.round(displayWidth * dpr)),
          pixelHeight: Math.max(1, Math.round(displayHeight * dpr)),
        };
      }

      function renderPreview() {
        const surface = computePreviewSurface();
        elements.canvas.width = surface.pixelWidth;
        elements.canvas.height = surface.pixelHeight;
        elements.canvas.style.width = `${surface.cssWidth}px`;
        elements.canvas.style.height = `${surface.cssHeight}px`;
        const ctx = elements.canvas.getContext("2d", { alpha: false });
        renderArtwork(ctx, surface.pixelWidth, surface.pixelHeight, state);
      }

      function queueRender() {
        if (renderToken) {
          return;
        }
        renderToken = window.requestAnimationFrame(() => {
          renderToken = 0;
          syncControlValues();
          renderPreview();
        });
      }

      function bindCommonControls() {
        elements.sizePreset.addEventListener("change", (event) => {
          applySizePreset(event.currentTarget.value);
        });

        elements.paletteSelect.addEventListener("change", (event) => {
          state.palette = event.currentTarget.value;
          queueRender();
        });

        elements.densityInput.addEventListener("input", (event) => {
          state.density = Number(event.currentTarget.value);
          queueRender();
        });

        elements.complexityInput.addEventListener("input", (event) => {
          state.complexity = Number(event.currentTarget.value);
          queueRender();
        });

        elements.seedInput.addEventListener("change", (event) => {
          const value = normalizeSeed(event.currentTarget.value);
          state.seed = value;
          event.currentTarget.value = String(value);
          queueRender();
        });

        ["width", "height"].forEach((fieldName) => {
          const input = fieldName === "width" ? elements.widthInput : elements.heightInput;
          input.addEventListener("change", () => {
            if (validateDimensionInput(fieldName)) {
              queueRender();
            }
          });
        });

        elements.regenerateButton.addEventListener("click", () => {
          state.seed = nextSeed();
          syncControlValues();
          queueRender();
        });

        elements.randomizeButton.addEventListener("click", () => {
          randomizeCurrentPreset();
          setFeedback("已生成一组新的参数组合", "success");
        });

        elements.resetButton.addEventListener("click", () => {
          resetCurrentPreset();
        });

        elements.exportButton.addEventListener("click", () => {
          void exportPng();
        });

        window.addEventListener("resize", queueRender);
      }

      function getExportStrategy(protocol = window.location.protocol, userAgent = window.navigator.userAgent) {
        const normalizedProtocol = String(protocol || "").toLowerCase();
        const normalizedAgent = String(userAgent || "").toLowerCase();
        const isFileProtocol = normalizedProtocol === "file:";
        const isSafari = normalizedAgent.includes("safari")
          && !normalizedAgent.includes("chrome")
          && !normalizedAgent.includes("chromium")
          && !normalizedAgent.includes("android");
        return isFileProtocol || isSafari ? "data-url" : "blob";
      }

      function triggerAnchorDownload(href, fileName) {
        const anchor = document.createElement("a");
        anchor.href = href;
        anchor.download = fileName;
        anchor.rel = "noopener";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      }

      async function exportPng() {
        try {
          const exportCanvas = document.createElement("canvas");
          exportCanvas.width = state.width;
          exportCanvas.height = state.height;
          const exportContext = exportCanvas.getContext("2d", { alpha: false });
          renderArtwork(exportContext, state.width, state.height, state);
          const fileName = `wallpaper-${state.preset}-${state.width}x${state.height}-${state.seed}.png`;
          const strategy = getExportStrategy();

          if (strategy === "data-url") {
            const href = exportCanvas.toDataURL("image/png");
            triggerAnchorDownload(href, fileName);
            setFeedback(`已开始导出 ${fileName}`, "success", 2800);
            return fileName;
          }

          const blob = await new Promise((resolve) => exportCanvas.toBlob(resolve, "image/png"));
          if (!blob) {
            const href = exportCanvas.toDataURL("image/png");
            triggerAnchorDownload(href, fileName);
            setFeedback(`已开始导出 ${fileName}`, "success", 2800);
            return fileName;
          }

          const href = URL.createObjectURL(blob);
          triggerAnchorDownload(href, fileName);
          window.setTimeout(() => URL.revokeObjectURL(href), 60000);
          setFeedback(`已开始导出 ${fileName}`, "success", 2800);
          return fileName;
        } catch (error) {
          setFeedback(`导出失败：${error.message}`, "error", 3200);
          throw error;
        }
      }

      function initialize() {
        buildPresetButtons();
        buildSelectOptions();
        bindCommonControls();
        syncPresetSelection();
        updateDerivedSizePreset();
        syncControlValues();
        renderAdvancedControls();
        renderPreview();
      }

      function getCanvasSignature() {
        const sampleWidth = Math.min(64, elements.canvas.width);
        const sampleHeight = Math.min(64, elements.canvas.height);
        const sampleCanvas = document.createElement("canvas");
        sampleCanvas.width = sampleWidth;
        sampleCanvas.height = sampleHeight;
        const sampleContext = sampleCanvas.getContext("2d", { willReadFrequently: true });
        sampleContext.drawImage(elements.canvas, 0, 0, sampleWidth, sampleHeight);
        const pixels = sampleContext.getImageData(0, 0, sampleWidth, sampleHeight).data;
        let total = 0;
        for (let index = 0; index < pixels.length; index += 16) {
          total += pixels[index] + pixels[index + 1] + pixels[index + 2];
        }
        return total;
      }

      window.__app = {
        getState: () => JSON.parse(JSON.stringify(state)),
        switchPreset,
        randomizeCurrentPreset,
        resetCurrentPreset,
        exportPng,
        getExportStrategy,
        getCanvasSignature,
        renderPreview,
      };

      initialize();
    </script>
  </body>
</html>
