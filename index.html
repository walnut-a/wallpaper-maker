<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手机壁纸生成器</title>
    <link
      rel="icon"
      href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="16" fill="%23f4efe8"/%3E%3Crect x="14" y="6" width="36" height="52" rx="12" fill="%23f6dfd2"/%3E%3Cellipse cx="34" cy="24" rx="12" ry="18" fill="%23bdd7f1" fill-opacity="0.9"/%3E%3Cellipse cx="32" cy="42" rx="8" ry="14" fill="%236f88b3" fill-opacity="0.85"/%3E%3C/svg%3E'
    />
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f4efe8;
        --page-tint: #ede6dd;
        --panel-bg: rgba(250, 247, 242, 0.95);
        --panel-strong: rgba(255, 253, 249, 0.97);
        --panel-border: rgba(77, 64, 53, 0.12);
        --preview-shell: rgba(250, 248, 244, 0.9);
        --preview-border: rgba(78, 63, 50, 0.1);
        --text-strong: #2d231c;
        --text-main: #56483d;
        --text-muted: #87786c;
        --text-soft: #a09286;
        --accent: #8a6049;
        --accent-soft: rgba(138, 96, 73, 0.12);
        --accent-strong: #704634;
        --danger: #b4513d;
        --line-strong: rgba(77, 64, 53, 0.18);
        --shadow-soft: 0 18px 50px rgba(72, 53, 40, 0.06);
        --shadow-preview: 0 22px 72px rgba(54, 41, 30, 0.13);
        --radius-xl: 24px;
        --radius-lg: 18px;
        --radius-md: 14px;
        --radius-sm: 10px;
        --panel-width: min(25rem, 100%);
        --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", "Baskerville", serif;
        --font-body: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at top left, rgba(173, 141, 120, 0.12), transparent 28%),
          radial-gradient(circle at bottom right, rgba(123, 104, 87, 0.08), transparent 32%),
          linear-gradient(180deg, var(--page-bg), var(--page-tint));
        color: var(--text-main);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(96, 74, 53, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(96, 74, 53, 0.025) 1px, transparent 1px);
        background-size: 34px 34px;
        mask-image: radial-gradient(circle at center, black 22%, transparent 82%);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at center, transparent 58%, rgba(96, 74, 53, 0.07) 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        display: grid;
        height: 100vh;
        min-height: 100vh;
        grid-template-columns: minmax(18rem, var(--panel-width)) minmax(0, 1fr);
      }

      .control-panel {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 1.05rem;
        padding: 1.45rem;
        background: linear-gradient(180deg, var(--panel-strong), var(--panel-bg));
        border-right: 1px solid var(--panel-border);
        box-shadow:
          inset -1px 0 0 rgba(255, 255, 255, 0.34),
          18px 0 48px rgba(74, 58, 44, 0.06);
        height: 100vh;
        overflow: auto;
        overflow-x: hidden;
        z-index: 1;
        backdrop-filter: blur(14px);
      }

      .control-panel::before {
        content: "";
        position: absolute;
        inset: 0 0 auto 0;
        height: 8.5rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.46), transparent);
        pointer-events: none;
      }

      .panel-head {
        display: grid;
        gap: 0.35rem;
      }

      .panel-head h1 {
        margin: 0;
        max-width: 17ch;
        color: var(--text-strong);
        font-size: 2.55rem;
        font-weight: 600;
        line-height: 0.95;
        letter-spacing: 0;
      }

      .feedback {
        display: none;
        color: var(--text-muted);
        font-size: 0.87rem;
      }

      .feedback[data-tone="error"] {
        color: var(--danger);
      }

      .feedback[data-tone="success"] {
        color: var(--accent-strong);
      }

      .panel-section {
        display: grid;
        gap: 0.85rem;
        padding-top: 1.1rem;
        border-top: 1px solid rgba(77, 64, 53, 0.1);
      }

      .panel-section:first-of-type {
        padding-top: 0;
        border-top: 0;
      }

      .section-title {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.73rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .preset-grid {
        display: grid;
        gap: 0.65rem;
      }

      .preset-option {
        display: grid;
        gap: 0.28rem;
        width: 100%;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(77, 64, 53, 0.12);
        border-radius: var(--radius-md);
        background: rgba(255, 255, 255, 0.58);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.44);
        text-align: left;
        color: var(--text-main);
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .preset-option:hover,
      .preset-option:focus-visible {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 12px 28px rgba(77, 61, 47, 0.06);
        outline: none;
      }

      .preset-option.is-active {
        background: linear-gradient(180deg, rgba(138, 96, 73, 0.13), rgba(138, 96, 73, 0.06));
        border-color: rgba(112, 70, 52, 0.28);
        box-shadow: 0 12px 32px rgba(77, 61, 47, 0.08);
      }

      .preset-name {
        color: var(--text-strong);
        font-size: 0.96rem;
        font-weight: 600;
      }

      .candidate-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding-top: 0.2rem;
      }

      .candidate-title {
        color: var(--text-muted);
        font-size: 0.78rem;
        font-weight: 600;
      }

      .candidate-refresh {
        appearance: none;
        padding: 0.35rem 0.65rem;
        border: 1px solid rgba(77, 64, 53, 0.12);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.58);
        color: var(--text-main);
        font-size: 0.76rem;
        cursor: pointer;
      }

      .candidate-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.55rem;
      }

      .candidate-option {
        appearance: none;
        display: grid;
        gap: 0.36rem;
        padding: 0.42rem;
        border: 1px solid rgba(77, 64, 53, 0.12);
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.58);
        color: var(--text-muted);
        font-size: 0.68rem;
        cursor: pointer;
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .candidate-option:hover,
      .candidate-option:focus-visible {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 10px 22px rgba(77, 61, 47, 0.08);
        outline: none;
      }

      .candidate-option canvas {
        display: block;
        width: 100%;
        aspect-ratio: 9 / 16;
        border-radius: 0.55rem;
        background: #e8ddd1;
      }

      .candidate-option span {
        display: block;
        text-align: center;
      }

      .field-grid {
        display: grid;
        gap: 0.9rem;
      }

      .two-column {
        display: grid;
        gap: 0.8rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 0.38rem;
      }

      .field label,
      .slider-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.6rem;
        color: var(--text-main);
        font-size: 0.84rem;
        font-weight: 500;
      }

      .value-badge {
        color: var(--text-muted);
        font-size: 0.76rem;
      }

      .field input[type="number"],
      .field select {
        width: 100%;
        height: 3rem;
        padding: 0 0.96rem;
        border: 1px solid rgba(77, 64, 53, 0.14);
        border-radius: 1.05rem;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text-strong);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.52);
      }

      .field select {
        appearance: none;
        padding-right: 3rem;
        background-image: url("data:image/svg+xml,%3Csvg width='14' height='10' viewBox='0 0 14 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 2.25L7 7.25L12 2.25' stroke='%2363564B' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 1rem center;
        background-size: 14px 10px;
      }

      .field input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .field input:hover,
      .field select:hover {
        border-color: var(--line-strong);
      }

      .field input:focus-visible,
      .field select:focus-visible,
      .action-button:focus-visible,
      .preset-option:focus-visible,
      summary:focus-visible {
        outline: none;
        border-color: color-mix(in srgb, var(--accent) 56%, rgba(77, 64, 53, 0.14));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.64),
          0 0 0 4px rgba(138, 96, 73, 0.11);
      }

      .field-help {
        color: var(--text-muted);
        font-size: 0.75rem;
        line-height: 1.4;
      }

      .action-grid {
        display: grid;
        gap: 0.7rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .action-button {
        appearance: none;
        min-height: 3rem;
        padding: 0.8rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid rgba(77, 64, 53, 0.12);
        background: rgba(255, 255, 255, 0.56);
        color: var(--text-strong);
        cursor: pointer;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.44);
        transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
      }

      .action-button:hover {
        transform: translateY(-1px);
        border-color: var(--line-strong);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 14px 24px rgba(77, 61, 47, 0.08);
      }

      .action-button.primary {
        border-color: rgba(112, 70, 52, 0.22);
        background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 84%, #5a4330) 100%);
        color: rgba(255, 249, 242, 0.96);
        box-shadow: 0 16px 28px rgba(45, 36, 29, 0.16);
      }

      .action-button.primary:hover {
        border-color: rgba(112, 70, 52, 0.32);
        background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 92%, white), color-mix(in srgb, var(--accent) 84%, #5a4330));
        box-shadow: 0 20px 34px rgba(45, 36, 29, 0.2);
      }

      .advanced-panel {
        border: 1px solid rgba(77, 64, 53, 0.1);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.5);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.42);
        overflow: clip;
      }

      .advanced-panel summary {
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.05rem;
        cursor: pointer;
        color: var(--text-strong);
        font-size: 0.88rem;
        font-weight: 600;
      }

      .advanced-panel summary::-webkit-details-marker {
        display: none;
      }

      .advanced-hint {
        color: var(--text-muted);
        font-size: 0.76rem;
        font-weight: 400;
      }

      .advanced-panel[open] summary {
        border-bottom: 1px solid rgba(77, 64, 53, 0.08);
      }

      .advanced-content {
        display: grid;
        gap: 1rem;
        padding: 1rem 1.05rem 1.1rem;
      }

      .advanced-group {
        display: grid;
        gap: 0.85rem;
      }

      .advanced-group-title {
        color: var(--text-strong);
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .preview-panel {
        display: grid;
        place-items: stretch;
        height: 100vh;
        min-height: 100vh;
        padding: clamp(1rem, 2vw, 1.6rem);
      }

      .preview-stage {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        place-items: center;
        gap: 0.8rem;
        height: 100%;
        min-height: 0;
        padding: clamp(1rem, 2vw, 2rem) clamp(1rem, 2vw, 2rem) clamp(1.45rem, 3vw, 2.4rem);
        border-radius: var(--radius-xl);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.74), rgba(246, 240, 232, 0.92)),
          var(--preview-shell);
        border: 1px solid var(--preview-border);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
      }

      .preview-stage::before {
        content: "";
        position: absolute;
        inset: 1rem;
        border-radius: calc(var(--radius-xl) - 10px);
        border: 1px solid rgba(77, 64, 53, 0.08);
        pointer-events: none;
      }

      #wallpaperCanvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        border-radius: calc(var(--radius-lg) - 2px);
        box-shadow: var(--shadow-preview);
        background: #e8ddd1;
      }

      .preview-meta {
        position: static;
        justify-self: center;
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
        flex-wrap: wrap;
        margin-bottom: clamp(1.3rem, 2.8vw, 2rem);
        padding: 0.55rem 0.78rem;
        border-radius: 999px;
        background: rgba(252, 248, 242, 0.7);
        border: 1px solid rgba(77, 64, 53, 0.12);
        backdrop-filter: blur(8px);
        color: var(--text-main);
        font-size: 0.78rem;
      }

      .preview-meta strong {
        color: var(--text-strong);
        font-weight: 600;
      }

      .panel-foot {
        display: flex;
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid rgba(77, 64, 53, 0.1);
      }

      .project-link {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        width: fit-content;
        margin-top: auto;
        color: var(--text-soft);
        font-size: 0.78rem;
        text-decoration: none;
        transition: color 140ms ease;
      }

      .project-link:hover {
        color: var(--text-strong);
      }

      @media (max-width: 1120px) {
        .app-shell {
          grid-template-columns: minmax(19rem, 22rem) minmax(0, 1fr);
        }

        .control-panel {
          padding: 1.35rem;
        }

        .preview-panel {
          padding: 0.9rem;
        }

        .preview-stage {
          padding: 0.9rem;
        }
      }

      @media (max-width: 760px) {
        .app-shell {
          height: auto;
          grid-template-columns: 1fr;
          grid-template-rows: minmax(32rem, 62svh) auto;
        }

        .control-panel {
          order: 2;
          border-right: 0;
          border-top: 1px solid var(--panel-border);
          height: auto;
          overflow: visible;
          padding: 1.15rem 1rem 1.4rem;
        }

        .preview-panel {
          order: 1;
          height: auto;
          min-height: 58svh;
          padding: 0.8rem;
        }

        .preview-stage {
          padding: 0.9rem 0.75rem 2.15rem;
        }

        .preview-stage::before {
          inset: 0.85rem;
        }
      }

      @media (max-width: 640px) {
        .action-grid,
        .two-column {
          grid-template-columns: 1fr;
        }

        .panel-head h1 {
          font-size: 2.3rem;
        }

        .preview-meta {
          justify-content: space-between;
          border-radius: 18px;
          margin-bottom: 1.55rem;
        }

        .preview-panel {
          min-height: 60svh;
        }

        .preview-stage {
          padding: 0.95rem 0.7rem 2.2rem;
        }

        .preview-stage::before {
          inset: 0.85rem 0.7rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-panel">
        <header class="panel-head">
          <h1>手机壁纸生成器</h1>
          <div id="feedback" class="feedback" aria-live="polite"></div>
        </header>

        <section class="panel-section" aria-labelledby="preset-heading">
          <h2 id="preset-heading" class="section-title">组合预设</h2>
          <div id="presetGrid" class="preset-grid"></div>
          <div class="candidate-head">
            <div class="candidate-title">精选候选</div>
            <button id="refreshCandidatesButton" class="candidate-refresh" type="button">换一组</button>
          </div>
          <div id="candidateStrip" class="candidate-strip" aria-label="精选候选"></div>
        </section>

        <section class="panel-section" aria-labelledby="composition-heading">
          <h2 id="composition-heading" class="section-title">自由组合</h2>
          <div class="field-grid">
            <div class="field">
              <label for="backgroundModeSelect">背景气氛</label>
              <select id="backgroundModeSelect" name="backgroundMode"></select>
            </div>
            <div class="field">
              <label for="shapeModeSelect">主体图形</label>
              <select id="shapeModeSelect" name="shapeMode"></select>
            </div>
            <div class="field">
              <label for="textureModeSelect">纹理覆盖</label>
              <select id="textureModeSelect" name="textureMode"></select>
            </div>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="size-heading">
          <h2 id="size-heading" class="section-title">尺寸与基础参数</h2>
          <div class="field-grid">
            <div class="field">
              <label for="sizePreset">尺寸预设</label>
              <select id="sizePreset" name="sizePreset"></select>
            </div>
            <div class="two-column">
              <div class="field">
                <label for="widthInput">宽度</label>
                <input id="widthInput" name="width" type="number" min="320" max="6000" step="1" inputmode="numeric" />
              </div>
              <div class="field">
                <label for="heightInput">高度</label>
                <input id="heightInput" name="height" type="number" min="320" max="6000" step="1" inputmode="numeric" />
              </div>
            </div>
            <div class="field-help">宽度和高度可设置在 320 到 6000 像素之间。</div>
            <div class="field">
              <label for="paletteSelect">调色板</label>
              <select id="paletteSelect" name="palette"></select>
            </div>
            <div class="field">
              <div class="slider-header">
                <label for="densityInput">密度</label>
                <span id="densityValue" class="value-badge">45%</span>
              </div>
              <input id="densityInput" name="density" type="range" min="0.15" max="0.95" step="0.01" />
            </div>
            <div class="field">
              <div class="slider-header">
                <label for="complexityInput">复杂度</label>
                <span id="complexityValue" class="value-badge">50%</span>
              </div>
              <input id="complexityInput" name="complexity" type="range" min="0.1" max="0.95" step="0.01" />
            </div>
            <div class="field">
              <label for="seedInput">随机种子</label>
              <input id="seedInput" name="seed" type="number" min="1" max="999999999" step="1" inputmode="numeric" />
              <div class="field-help">相同参数和相同种子会得到相同画面。</div>
            </div>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="actions-heading">
          <h2 id="actions-heading" class="section-title">动作</h2>
          <div class="action-grid">
            <button id="regenerateButton" class="action-button" type="button">重新生成</button>
            <button id="randomizeButton" class="action-button" type="button">随机参数</button>
            <button id="randomizeMixButton" class="action-button" type="button">随机混搭</button>
            <button id="resetButton" class="action-button" type="button">恢复当前组合</button>
            <button id="exportButton" class="action-button primary" type="button">导出 PNG</button>
          </div>
        </section>

        <section class="panel-section" aria-labelledby="advanced-heading">
          <h2 id="advanced-heading" class="section-title">高级参数</h2>
          <details id="advancedPanel" class="advanced-panel">
            <summary>
              <span>展开细调</span>
              <span class="advanced-hint">默认收起，减少压力</span>
            </summary>
            <div id="advancedContent" class="advanced-content"></div>
          </details>
        </section>

        <div class="panel-foot">
          <a
            class="project-link"
            href="https://github.com/walnut-a/wallpaper-maker"
            target="_blank"
            rel="noreferrer"
          >
            View on Github
          </a>
        </div>
      </aside>

      <section class="preview-panel">
        <div id="previewStage" class="preview-stage">
          <canvas id="wallpaperCanvas" aria-label="壁纸预览"></canvas>
          <div class="preview-meta">
            <span><strong id="previewPresetLabel">极简秩序感</strong></span>
            <span id="previewSizeLabel">1290 × 2796</span>
            <span id="previewPaletteLabel">暮光陶土</span>
          </div>
        </div>
      </section>
    </main>

    <script>
      const sizePresets = [
        { value: "iphone-pro-max", label: "iPhone Pro Max", width: 1290, height: 2796 },
        { value: "iphone-pro", label: "iPhone Pro", width: 1179, height: 2556 },
        { value: "android-tall", label: "Android 高屏", width: 1440, height: 3200 },

          sharedAdvancedGroup,
          ...getModeGroups(backgroundModes, currentState.backgroundMode),
          ...getModeGroups(shapeModes, currentState.shapeMode),
          ...getModeGroups(textureModes, currentState.textureMode),
        ];

        return {
          ...sharedAdvancedDefaults,
          ...(backgroundModes[backgroundMode]?.defaults ?? {}),
          ...(shapeModes[shapeMode]?.defaults ?? {}),
          ...(textureModes[textureMode]?.defaults ?? {}),
          ...(presetKey && compositionPresets[presetKey]?.defaults.advanced ? compositionPresets[presetKey].defaults.advanced : {}),
        };
      }

      function getPresetLabel(presetKey) {
        if (presetKey === "custom") {
          return "自定义组合";
        }
        return presetDefinitions[presetKey]?.label ?? "自定义组合";
      }

      function getCompositionSummary(currentState) {
        if (currentState.preset !== "custom") {
          return palettes[currentState.palette].label;
        }
        return `${shapeModes[currentState.shapeMode].label} · ${textureModes[currentState.textureMode].label}`;

      function buildDefaultState(presetKey) {
        const preset = presetDefinitions[presetKey];
        return {
          preset: presetKey,
          backgroundMode: preset.backgroundMode,
          shapeMode: preset.shapeMode,
          textureMode: preset.textureMode,

          seed: 314159,
          palette: preset.defaults.palette,
          density: preset.defaults.density,
          complexity: preset.defaults.complexity,
          advanced: buildAdvancedDefaults({

          }),

      let feedbackTimer = 0;

      let candidateStates = [];

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function normalizeSeed(seed) {
        const numeric = Number.isFinite(Number(seed)) ? Math.abs(Math.trunc(Number(seed))) : 1;
        return numeric === 0 ? 1 : numeric % 2147483647;
      }

      function makeRng(seed) {
        let current = normalizeSeed(seed);
        return function next() {
          current += 0x6d2b79f5;
          let result = Math.imul(current ^ (current >>> 15), current | 1);
          result ^= result + Math.imul(result ^ (result >>> 7), result | 61);
          return ((result ^ (result >>> 14)) >>> 0) / 4294967296;
        };
      }

      function choose(rng, items) {
        return items[Math.floor(rng() * items.length)];
      }

      function formatPercent(value) {
        return `${Math.round(Number(value) * 100)}%`;
      }

      function setFeedback(message, tone = "neutral", hold = 2200) {
        elements.feedback.textContent = message;
        elements.feedback.dataset.tone = tone;
        window.clearTimeout(feedbackTimer);
        if (message) {
          feedbackTimer = window.setTimeout(() => {
            elements.feedback.textContent = "";
            elements.feedback.dataset.tone = "neutral";
          }, hold);
        }
      }

      function findMatchingSizePreset(width, height) {
        const found = sizePresets.find((item) => item.width === width && item.height === height);
        return found ? found.value : "custom";
      }

      function updateDerivedSizePreset() {
        state.sizePreset = findMatchingSizePreset(state.width, state.height);
      }

      function presetAccentAlpha(stateValue, floor = 0.14, ceiling = 0.72) {
        return floor + (ceiling - floor) * clamp(stateValue, 0, 1);

          button.className = "preset-option";
          button.dataset.preset = key;
          button.innerHTML = `<span class="preset-name">${config.label}</span>`;
          button.addEventListener("click", () => switchPreset(key));
          elements.presetGrid.appendChild(button);
        });
      }

      function buildSelectOptions() {
        elements.sizePreset.innerHTML = "";
        sizePresets.forEach((item) => {
          const option = document.createElement("option");
          option.value = item.value;
          option.textContent = `${item.label} · ${item.width} × ${item.height}`;
          elements.sizePreset.appendChild(option);
        });
        const customOption = document.createElement("option");
        customOption.value = "custom";
        customOption.textContent = "自定义";
        elements.sizePreset.appendChild(customOption);

        elements.paletteSelect.innerHTML = "";
        Object.entries(palettes).forEach(([key, palette]) => {

          option.value = key;
          option.textContent = palette.label;
          elements.paletteSelect.appendChild(option);

        elements.backgroundModeSelect.innerHTML = "";
        Object.entries(backgroundModes).forEach(([key, mode]) => {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = mode.label;
          elements.backgroundModeSelect.appendChild(option);
        });

        elements.shapeModeSelect.innerHTML = "";
        Object.entries(shapeModes).forEach(([key, mode]) => {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = mode.label;
          elements.shapeModeSelect.appendChild(option);
        });

        elements.textureModeSelect.innerHTML = "";
        Object.entries(textureModes).forEach(([key, mode]) => {

          option.textContent = mode.label;
          elements.textureModeSelect.appendChild(option);
